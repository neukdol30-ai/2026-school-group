spring:
  application:
    name: group_project

  datasource:
    driver-class-name: oracle.jdbc.OracleDriver
    url: jdbc:oracle:thin:@//localhost:1521/xe
    username: spring
    password: 1234

    thymeleaf:
      cache: false

    devtools:
      livereload:
        enabled: true
      restart:
        enabled: true

  mybatis:
    mapper-locations: classpath:mybatis/mapper/**/*.xml
    type-aliases-package: com.siyan1234.mybatis.member.dto,com.siyan1234.mybatis.board.dto
    configuration:
      map-underscore-to-camel-case: true