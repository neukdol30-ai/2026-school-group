<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>인증 게시글 수정</title>

    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" th:href="@{/css/photoBoard/update.css}">

</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<main>
    <section class="content-grid">

        <aside>
            <h2>메뉴</h2>
            <a href="/">홈</a>
            <a href="/board/list">자유게시판</a>
            <a href="/photoBoard/list" class="active">인증게시판</a>
            <a href="/member/mypage">내정보</a>
        </aside>

        <section class="write-card">
            <div class="write-title">
                <h1>인증 게시글 수정</h1>
                <p>작성한 맛집 리뷰 내용을 수정할 수 있습니다.</p>
            </div>

            <form action="/photoBoard/update" method="post">
                <input type="hidden" name="no" th:value="${board.no}">

                <div class="form-control">
                    <label>제목</label>
                    <input type="text" name="title" th:value="${board.title}">
                </div>

                <div class="form-row">
                    <div class="form-control">
                        <label>맛집명</label>
                        <input type="text" name="restaurantName" th:value="${board.restaurantName}">
                    </div>

                    <div class="form-control">
                        <label>카테고리</label>
                        <select name="category">
                            <option value="한식" th:selected="${board.category == '한식'}">한식</option>
                            <option value="중식" th:selected="${board.category == '중식'}">중식</option>
                            <option value="일식" th:selected="${board.category == '일식'}">일식</option>
                            <option value="양식" th:selected="${board.category == '양식'}">양식</option>
                            <option value="카페" th:selected="${board.category == '카페'}">카페</option>
                            <option value="기타" th:selected="${board.category == '기타'}">기타</option>
                        </select>
                    </div>
                </div>

                <div class="form-control">
                    <label>주소</label>
                    <input type="text" name="address" th:value="${board.address}">
                </div>

                <div class="form-control">
                    <label>한 줄 설명</label>
                    <input type="text" name="description" th:value="${board.description}">
                </div>

                <div class="form-control">
                    <label>평점</label>
                    <select name="rating">
                        <option value="5" th:selected="${board.rating == 5}">5점</option>
                        <option value="4" th:selected="${board.rating == 4}">4점</option>
                        <option value="3" th:selected="${board.rating == 3}">3점</option>
                        <option value="2" th:selected="${board.rating == 2}">2점</option>
                        <option value="1" th:selected="${board.rating == 1}">1점</option>
                    </select>
                </div>

                <div class="current-photo" th:if="${board.imageUrl != null}">
                    <p>현재 등록된 사진</p>
                    <img th:src="@{${board.imageUrl}}" alt="현재 사진">
                </div>

                <div class="form-control">
                    <label>리뷰 내용</label>
                    <textarea name="content"
                              required
                              th:text="${board.content}"></textarea>
                </div>

                <div class="bottom-actions">
                    <a th:href="@{/photoBoard/view(no=${board.no})}"
                       class="btn btn-list">
                        뒤로가기
                    </a>

                    <div class="right-actions">
                        <a th:href="@{/photoBoard/view(no=${board.no})}"
                           class="btn btn-cancel">
                            취소
                        </a>

                        <button type="submit" class="btn btn-submit">
                            수정
                        </button>
                    </div>
                </div>

            </form>
        </section>

    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
