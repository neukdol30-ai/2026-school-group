<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>사진 리뷰 게시판</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-purple-50 via-white to-pink-50">

<div class="container mx-auto max-w-6xl py-10 px-4">

    <!-- 상단 -->
    <div class="flex justify-between items-center mb-8">

        <div>
            <h1 class="text-5xl font-extrabold text-slate-800">
                📸 사진 리뷰 게시판
            </h1>

            <p class="text-gray-500 mt-3 text-lg">
                맛집 사진과 평점을 함께 남겨보세요!
            </p>
        </div>

        <a href="/photoBoard/write"
           class="btn btn-primary btn-lg shadow-lg">
            ✏️ 글쓰기
        </a>

    </div>

    <!-- 번호 / 제목 / 평점 라인 -->
    <div class="bg-white rounded-2xl shadow-md px-6 py-4 mb-6">

        <div class="grid grid-cols-6 text-center font-bold text-purple-700">
            <div>번호</div>
            <div>제목</div>
            <div>평점</div>
            <div>조회수</div>
            <div>좋아요</div>
            <div>작성일</div>
        </div>

    </div>

    <!-- 게시글 없을 때 -->
    <div th:if="${#lists.isEmpty(boardList)}"
         class="bg-white rounded-3xl shadow-xl p-16 text-center">

        <div class="text-7xl mb-4">
            🍽️
        </div>

        <h2 class="text-3xl font-bold mb-3">
            아직 등록된 리뷰가 없습니다
        </h2>

        <p class="text-gray-500 mb-6">
            첫 번째 맛집 리뷰를 작성해보세요.
        </p>

        <a href="/photoBoard/write"
           class="btn btn-primary">
            리뷰 작성하기
        </a>

    </div>

    <!-- 게시글 있을 때 -->
    <div th:if="${!#lists.isEmpty(boardList)}"
         class="bg-white rounded-3xl shadow-xl overflow-hidden">

        <table class="table">

            <tbody>

            <tr th:each="board : ${boardList}"
                class="hover:bg-purple-50 transition">

                <td class="text-center font-semibold"
                    th:text="${board.no}">
                </td>

                <td>
                    <a th:href="@{/photoBoard/view(no=${board.no})}"
                       class="font-bold text-slate-700 hover:text-purple-600"
                       th:text="${board.title}">
                    </a>
                </td>

                <td class="text-center">
                    ⭐ <span th:text="${board.rating}"></span>
                </td>

                <td class="text-center"
                    th:text="${board.hit}">
                </td>

                <td class="text-center">
                    ❤️ <span th:text="${board.likeCount}"></span>
                </td>

                <td class="text-center"
                    th:text="${board.regdate}">
                </td>

            </tr>

            </tbody>

        </table>

    </div>

    <!-- 페이지네이션 -->
    <div class="flex justify-center mt-8 gap-2">

        <button class="btn btn-sm">«</button>
        <button class="btn btn-sm btn-primary">1</button>
        <button class="btn btn-sm">2</button>
        <button class="btn btn-sm">3</button>
        <button class="btn btn-sm">4</button>
        <button class="btn btn-sm">5</button>
        <button class="btn btn-sm">»</button>

    </div>

</div>

</body>
</html>
