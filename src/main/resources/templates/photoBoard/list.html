<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>인증 게시판</title>

    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" th:href="@{/css/photoBoard/list.css}">

</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<main>
    <section class="page-title">
        <div>
            <h1>인증 게시판</h1>
            <p>방문한 맛집 사진과 후기를 인증하는 공간입니다.</p>
        </div>

        <a href="/photoBoard/write" class="write-btn">글쓰기</a>
    </section>

    <section class="content-grid">
        <aside>
            <h2>메뉴</h2>
            <a href="/">홈</a>
            <a href="/board/list">자유게시판</a>
            <a href="/photoBoard/list" class="active">인증게시판</a>
            <a href="/member/mypage">내정보</a>
        </aside>

        <section class="board-box">
            <div class="board-top">

                <form action="/photoBoard/list"
                      method="get"
                      class="search-form">

                    <input type="text"
                           name="keyword"
                           th:value="${keyword}"
                           placeholder="제목 검색"
                           class="search-input">

                    <button type="submit"
                            class="search-btn">
                        검색
                    </button>
                </form>

                <div class="board-summary">
                    <h2>인증 게시글 목록</h2>

                    <span class="board-count"
                          th:text="'전체 ' + ${totalCount} + '건'">
                        전체 0건
                    </span>
                </div>

            </div>

            <div class="board-table">
                <div class="board-head">
                    <div>번호</div>
                    <div>제목</div>
                    <div>평점</div>
                    <div>조회수</div>
                    <div>추천수</div>
                    <div>작성일</div>
                </div>

                <div th:if="${#lists.isEmpty(boardList)}" class="empty-box">
                    <h2>등록된 게시글이 없습니다</h2>
                    <p>첫 번째 인증 게시글을 작성해보세요.</p>
                    <br>
                    <a href="/photoBoard/write" class="write-btn">글쓰기</a>
                </div>

                <div th:if="${!#lists.isEmpty(boardList)}">
                    <div th:each="board : ${boardList}" class="board-row">
                        <div class="board-no" th:text="${board.no}">1</div>

                        <div class="board-title">
                            <a th:href="@{/photoBoard/view(no=${board.no})}"
                               th:text="${board.title}">
                                게시글 제목
                            </a>
                        </div>

                        <div class="board-data" th:text="${board.rating}">5.0</div>
                        <div class="board-data" th:text="${board.hit}">0</div>
                        <div class="board-data" th:text="${board.likeCount}">0</div>
                        <div class="board-data" th:text="${board.regdate}">2026-06-12</div>
                    </div>
                </div>
            </div>

            <!-- 실제 페이지 이동 -->
            <div class="paging" th:if="${totalPage > 1}">

                <!-- 이전 페이지 -->
                <a th:if="${page > 1}"
                   th:href="@{/photoBoard/list(page=${page - 1}, keyword=${keyword})}">
                    «
                </a>

                <span th:if="${page == 1}" class="disabled">
                    «
                </span>

                <!-- 페이지 번호 -->
                <a th:each="i : ${#numbers.sequence(1, totalPage)}"
                   th:href="@{/photoBoard/list(page=${i}, keyword=${keyword})}"
                   th:text="${i}"
                   th:classappend="${i == page} ? ' active' : ''">
                    1
                </a>

                <!-- 다음 페이지 -->
                <a th:if="${page < totalPage}"
                   th:href="@{/photoBoard/list(page=${page + 1}, keyword=${keyword})}">
                    »
                </a>

                <span th:if="${page == totalPage}" class="disabled">
                    »
                </span>

            </div>
        </section>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<!-- Controller에서 전달한 오류 메시지가 있으면 alert 창으로 보여줌 -->
<script th:if="${errorMessage != null}" th:inline="javascript">
    alert(/*[[${errorMessage}]]*/ '오류가 발생했습니다.');
</script>

</body>
</html>
