<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>인증 게시글 작성</title>

    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" th:href="@{/css/photoBoard/write.css}">

</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<main>

    <section class="page-title">
        <div>
            <h1>인증 게시판</h1>
            <p>방문한 맛집 사진과 후기를 인증하는 공간입니다.</p>
        </div>

        <a href="/photoBoard/write" class="write-btn">글쓰기</a>
    </section>

    <section class="content-grid">

        <aside>
            <h2>메뉴</h2>
            <a href="/">홈</a>
            <a href="/board/list">자유게시판</a>
            <a href="/photoBoard/list" class="active">인증게시판</a>
            <a href="/member/mypage">내정보</a>
        </aside>

        <section class="write-card">
            <div class="write-title">
                <h1>📸 사진 리뷰 작성</h1>
                <p>방문한 맛집의 사진과 후기를 남겨주세요.</p>
            </div>

            <!-- 컨트롤러에서 redirectAttributes로 넘긴 오류 메시지 표시 -->
            <div th:if="${errorMessage}" class="server-error">
                <span th:text="${errorMessage}"></span>
            </div>

            <form action="/photoBoard/write" method="post" enctype="multipart/form-data">

                <div class="form-control">
                    <label>제목</label>
                    <input type="text"
                           name="title"
                           placeholder="제목을 입력하세요"
                           required>
                </div>

                <div class="form-row">
                    <div class="form-control">
                        <label>맛집명</label>
                        <input type="text"
                               name="restaurantName"
                               placeholder="맛집명"
                               required>
                    </div>

                    <div class="form-control">
                        <label>카테고리</label>
                        <select name="category" required>
                            <option value="" disabled selected>카테고리를 선택하세요</option>
                            <option value="한식">한식</option>
                            <option value="중식">중식</option>
                            <option value="일식">일식</option>
                            <option value="양식">양식</option>
                            <option value="카페">카페</option>
                            <option value="기타">기타</option>
                        </select>
                    </div>
                </div>

                <div class="form-control">
                    <label>주소</label>
                    <input type="text"
                           name="address"
                           placeholder="주소"
                           required>
                </div>

                <div class="form-control">
                    <label>한 줄 설명</label>
                    <input type="text"
                           name="summary"
                           placeholder="한 줄 설명 예) 분위기 좋은 파스타 맛집">
                </div>

                <div class="form-control">
                    <label>평점</label>
                    <select name="rating" required>
                        <option value="5">★★★★★ 5점</option>
                        <option value="4">★★★★☆ 4점</option>
                        <option value="3">★★★☆☆ 3점</option>
                        <option value="2">★★☆☆☆ 2점</option>
                        <option value="1">★☆☆☆☆ 1점</option>
                    </select>
                </div>

                <div class="upload-box">
                    <strong>사진 업로드</strong>
                    <p>사진은 1장만 등록 가능합니다.</p>
                    <input type="file"
                           name="file"
                           accept="image/*"
                           required>
                </div>

                <div class="form-control">
                    <label>리뷰 내용</label>
                    <textarea name="content"
                              placeholder="맛집 리뷰를 작성해주세요"
                              required></textarea>
                </div>

                <div class="bottom-actions">
                    <a href="/photoBoard/list" class="btn btn-list">목록</a>

                    <div class="right-actions">
                        <a href="/photoBoard/list" class="btn btn-cancel">취소</a>
                        <button type="submit" class="btn btn-submit">등록</button>
                    </div>
                </div>

            </form>
        </section>

    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
