<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>사진 리뷰 작성</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-base-200 min-h-screen">

<div class="container mx-auto max-w-3xl py-10 px-4">

    <div class="mb-6">
        <h1 class="text-3xl font-bold">📸 사진 리뷰 작성</h1>
        <p class="text-gray-500 mt-2">
            방문한 맛집의 사진과 후기를 남겨주세요.
        </p>
    </div>

    <form action="/photoBoard/write" method="post"
          enctype="multipart/form-data">

        <div class="card-body gap-5">

            <input type="text"
                   name="title"
                   class="input input-bordered w-full"
                   placeholder="제목을 입력하세요"
                   required>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text"
                       name="restaurantName"
                       class="input input-bordered w-full"
                       placeholder="맛집명"
                       required>

                <select name="category"
                        class="select select-bordered w-full">
                    <option value="한식">한식</option>
                    <option value="중식">중식</option>
                    <option value="일식">일식</option>
                    <option value="양식">양식</option>
                    <option value="카페">카페</option>
                    <option value="치킨">치킨</option>
                    <option value="분식">분식</option>
                    <option value="기타">기타</option>
                </select>
            </div>

            <input type="text"
                   name="address"
                   class="input input-bordered w-full"
                   placeholder="주소"
                   required>

            <input type="text"
                   name="description"
                   class="input input-bordered w-full"
                   placeholder="한줄 설명 예) 분위기 좋은 파스타 맛집">

            <select name="rating"
                    class="select select-bordered w-full">
                <option value="5">⭐⭐⭐⭐⭐ 5점</option>
                <option value="4">⭐⭐⭐⭐ 4점</option>
                <option value="3">⭐⭐⭐ 3점</option>
                <option value="2">⭐⭐ 2점</option>
                <option value="1">⭐ 1점</option>
            </select>

            <div class="border-2 border-dashed rounded-xl p-6 text-center bg-base-200">
                <p class="font-semibold mb-2">사진 업로드</p>
                <p class="text-sm text-gray-500 mb-3">
                    사진은 1장만 등록 가능합니다.
                </p>

                <!-- 파일 업로드 기능 연결 전이라 잠시 비활성화 -->
                <input type="file"
                       name="image"
                       class="file-input file-input-bordered w-full"
                       required>
            </div>

            <textarea name="content"
                      rows="8"
                      class="textarea textarea-bordered w-full"
                      placeholder="맛집 리뷰를 작성해주세요"
                      required></textarea>

            <div class="flex justify-end gap-2 pt-4">
                <a href="/photoBoard/list" class="btn">
                    취소
                </a>

                <button type="submit" class="btn btn-primary">
                    등록
                </button>
            </div>

        </div>
    </form>

</div>

</body>
</html>
