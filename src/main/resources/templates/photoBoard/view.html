<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>인증 게시글 상세보기</title>

    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" th:href="@{/css/photoBoard/view.css}">
</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<main>
    <section class="content-grid">

        <aside>
            <h2>메뉴</h2>
            <a th:href="@{/}">홈</a>
            <a th:href="@{/board/list}">자유게시판</a>
            <a th:href="@{/photoBoard/list}" class="active">인증게시판</a>
            <a th:href="@{/member/mypage}">내정보</a>
        </aside>

        <section class="view-card">

            <div class="view-top">
                <div class="view-title">

                    <!-- 게시글 제목 출력 -->
                    <h1 th:text="${board.title}">게시글 제목</h1>

                    <!-- 조회수, 추천수, 작성일 출력 -->
                    <div class="meta">
                        <span>조회수 : <b th:text="${board.hit}">0</b></span>
                        <span>추천수 : <b th:text="${board.likeCount}">0</b></span>
                        <span th:text="${board.regdate}">작성일</span>
                    </div>
                </div>

                <!-- 목록으로 이동 -->
                <a th:href="@{/photoBoard/list}" class="btn btn-list">목록</a>
            </div>

            <div class="score-area">

                <!-- 평점 출력 -->
                <span class="score-badge">
                    평점 <span th:text="${board.rating}">5</span>점
                </span>

                <!-- 추천 버튼 -->
                <a th:href="@{/photoBoard/like(no=${board.no})}"
                   class="like-badge">
                    추천 <span th:text="${board.likeCount}">0</span>
                </a>
            </div>

            <!-- 게시글 이미지가 있을 때만 사진 출력 -->
            <div class="photo-box" th:if="${board.imageUrl != null}">
                <img th:src="@{${board.imageUrl}}" alt="리뷰 사진">
            </div>

            <!-- 게시글 내용 출력 -->
            <div class="content-box" th:text="${board.content}">
                게시글 내용
            </div>

            <!-- 게시글 신고 영역 -->
            <div class="report-box" th:if="${!isAdmin}">
                <form th:action="@{/photoBoard/report/board}"
                      method="post"
                      onsubmit="return confirm('이 게시글을 신고하시겠습니까?')">

                    <!-- 신고할 게시글 번호 -->
                    <input type="hidden" name="boardNo" th:value="${board.no}">

                    <!-- 신고 사유 선택 -->
                    <select name="reason" required>
                        <option value="">신고 사유 선택</option>
                        <option value="욕설/비방">욕설/비방</option>
                        <option value="허위 정보">허위 정보</option>
                        <option value="광고/도배">광고/도배</option>
                        <option value="기타">기타</option>
                    </select>

                    <!-- 신고 상세 내용 -->
                    <input type="text"
                           name="content"
                           placeholder="신고 내용을 입력하세요">

                    <button type="submit" class="btn btn-delete">
                        게시글 신고
                    </button>
                </form>
            </div>

            <div class="comment-section">
                <h2>댓글</h2>

                <!-- 댓글이 없을 때 -->
                <div th:if="${#lists.isEmpty(commentList)}" class="comment-empty">
                    등록된 댓글이 없습니다.
                </div>

                <!-- 댓글이 있을 때 -->
                <div th:if="${!#lists.isEmpty(commentList)}">
                    <div th:each="comment : ${commentList}" class="comment-item">

                        <div class="comment-meta">
                            <span>
                                회원번호 <b th:text="${comment.memberNo}">1</b>
                            </span>

                            <div class="comment-right">
                                <span th:text="${comment.regdate}">작성일</span>

                                <!-- 댓글 삭제는 댓글 작성자 본인 또는 관리자만 보이게 처리 -->
                                <a class="comment-delete"
                                   th:if="${comment.memberNo == loginUser.no or isAdmin}"
                                   th:href="@{/photoBoard/comment/delete(no=${comment.no}, boardNo=${board.no})}"
                                   onclick="return confirm('댓글을 삭제하시겠습니까?')">
                                    삭제
                                </a>
                            </div>
                        </div>

                        <!-- 댓글 내용 출력 -->
                        <div class="comment-content" th:text="${comment.content}">
                            댓글 내용
                        </div>

                        <!-- 댓글 신고 영역 -->
                        <form   th:if="${!isAdmin}"
                                th:action="@{/photoBoard/report/comment}"
                              method="post"
                              class="comment-report-form"
                              onsubmit="return confirm('이 댓글을 신고하시겠습니까?')">

                            <!-- 현재 게시글 번호 -->
                            <input type="hidden" name="boardNo" th:value="${board.no}">

                            <!-- 신고할 댓글 번호 -->
                            <input type="hidden" name="commentNo" th:value="${comment.no}">

                            <select name="reason" required>
                                <option value="">신고 사유 선택</option>
                                <option value="욕설/비방">욕설/비방</option>
                                <option value="허위 정보">허위 정보</option>
                                <option value="광고/도배">광고/도배</option>
                                <option value="기타">기타</option>
                            </select>

                            <input type="text"
                                   name="content"
                                   placeholder="신고 내용을 입력하세요">

                            <button type="submit" class="btn btn-delete">
                                댓글 신고
                            </button>
                        </form>

                    </div>
                </div>

                <!-- 댓글 작성 폼 -->
                <form th:action="@{/photoBoard/comment/write}"
                      method="post"
                      class="comment-form">

                    <!-- 댓글이 달릴 게시글 번호 -->
                    <input type="hidden" name="boardNo" th:value="${board.no}">

                    <textarea name="content"
                              placeholder="댓글을 입력하세요"
                              required></textarea>

                    <button type="submit">댓글 등록</button>
                </form>
            </div>

            <div class="bottom-actions">
                <a th:href="@{/photoBoard/list}" class="btn btn-list">목록</a>

                <!-- 게시글 수정/삭제는 작성자 본인 또는 관리자만 보이게 처리 -->
                <div class="right-actions"
                     th:if="${board.memberNo == loginUser.no or isAdmin}">

                    <!-- 수정 화면으로 이동 -->
                    <a th:href="@{/photoBoard/update(no=${board.no})}"
                       class="btn btn-edit">
                        수정
                    </a>

                    <!-- 게시글 삭제 -->
                    <form th:action="@{/photoBoard/delete}"
                          method="post"
                          style="display:inline;"
                          onsubmit="return confirm('정말 삭제하시겠습니까?')">

                        <input type="hidden"
                               name="no"
                               th:value="${board.no}">

                        <button type="submit"
                                class="btn btn-delete"
                                style="border:none;cursor:pointer;">
                            삭제
                        </button>
                    </form>

                </div>
            </div>

        </section>

    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<!-- 성공 메시지가 있으면 alert 창으로 보여줌 -->
<script th:if="${successMessage != null}" th:inline="javascript">
    alert(/*[[${successMessage}]]*/ '처리되었습니다.');
</script>

<!-- 오류 메시지가 있으면 alert 창으로 보여줌 -->
<script th:if="${errorMessage != null}" th:inline="javascript">
    alert(/*[[${errorMessage}]]*/ '오류가 발생했습니다.');
</script>

</body>
</html>
