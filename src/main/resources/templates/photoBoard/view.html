<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>인증 게시글 상세보기</title>

    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" th:href="@{/css/photoBoard/view.css}">

</head>

<body>

<header>
    <div class="top-bar">
        <div class="top-inner">
            <div class="top-menu">
                <a href="/">🏠 홈</a>
                <a href="/notice">공지사항</a>
                <a href="/event">이벤트</a>
            </div>

            <div class="top-menu" th:if="${session.loginUser == null}">
                <a href="/member/login">로그인</a>
                <a href="/member/signup">회원가입</a>
            </div>

            <div class="top-menu" th:if="${session.loginUser != null}">
                <span>
                    <b th:text="${session.loginUser.name}"></b>님
                </span>
                <a href="/member/mypage">내정보</a>
                <a href="/member/logout">로그아웃</a>
            </div>
        </div>
    </div>

    <div class="brand-area">
        <a href="/" class="logo">맛집<span>모아모아</span></a>

        <form class="search-box">
            <input type="text" placeholder="검색어를 입력하세요">
            <button type="submit">🔍</button>
        </form>

        <div class="notice">
            <strong>실시간 인기글</strong> 인증게시판 새 글 확인하기
        </div>
    </div>

    <nav class="nav-area">
        <div class="nav-inner">
            <ul class="main-menu">
                <li><a href="/">🏠</a></li>
                <li><a href="/board/list">자유게시판</a></li>
                <li><a href="/photoBoard/list" class="active">인증게시판</a></li>
                <li><a href="/member/mypage">내정보</a></li>
            </ul>
        </div>
    </nav>
</header>

<main>
    <section class="content-grid">

        <aside>
            <h2>메뉴</h2>
            <a href="/">홈</a>
            <a href="/board/list">자유게시판</a>
            <a href="/photoBoard/list" class="active">인증게시판</a>
            <a href="/member/mypage">내정보</a>
        </aside>

        <section class="view-card">

            <div class="view-top">
                <div class="view-title">
                    <h1 th:text="${board.title}">게시글 제목</h1>

                    <div class="meta">
                        <span>조회수 : <b th:text="${board.hit}">0</b></span>
                        <span>추천수 : <b th:text="${board.likeCount}">0</b></span>
                        <span th:text="${board.regdate}">작성일</span>
                    </div>
                </div>

                <a href="/photoBoard/list" class="btn btn-list">목록</a>
            </div>

            <div class="score-area">
                <span class="score-badge">
                    평점 <span th:text="${board.rating}">5</span>점
                </span>

                <a th:href="@{/photoBoard/like(no=${board.no})}"
                   class="like-badge">
                    추천 <span th:text="${board.likeCount}">0</span>
                </a>
            </div>

            <div class="photo-box" th:if="${board.imageUrl != null}">
                <img th:src="@{${board.imageUrl}}" alt="리뷰 사진">
            </div>

            <div class="content-box" th:text="${board.content}">
                게시글 내용
            </div>

            <div class="comment-section">
                <h2>댓글</h2>

                <div th:if="${#lists.isEmpty(commentList)}" class="comment-empty">
                    등록된 댓글이 없습니다.
                </div>

                <div th:if="${!#lists.isEmpty(commentList)}">
                    <div th:each="comment : ${commentList}" class="comment-item">
                        <div class="comment-meta">
                            <span>회원번호 <b th:text="${comment.memberNo}">1</b></span>

                            <div class="comment-right">
                                <span th:text="${comment.regdate}">작성일</span>

                                <a class="comment-delete"
                                   th:href="@{/photoBoard/comment/delete(no=${comment.no}, boardNo=${board.no})}"
                                   onclick="return confirm('댓글을 삭제하시겠습니까?')">
                                    삭제
                                </a>
                            </div>
                        </div>

                        <div class="comment-content" th:text="${comment.content}">
                            댓글 내용
                        </div>
                    </div>
                </div>

                <form action="/photoBoard/comment/write" method="post" class="comment-form">
                    <input type="hidden" name="boardNo" th:value="${board.no}">

                    <textarea name="content"
                              placeholder="댓글을 입력하세요"
                              required></textarea>

                    <button type="submit">댓글 등록</button>
                </form>
            </div>

            <div class="bottom-actions">
                <a href="/photoBoard/list" class="btn btn-list">목록</a>

                <div class="right-actions">
                    <a th:href="@{/photoBoard/update(no=${board.no})}" class="btn btn-edit">수정</a>
                    <a th:href="@{/photoBoard/delete(no=${board.no})}" class="btn btn-delete">삭제</a>
                </div>
            </div>

        </section>

    </section>
</main>

<footer>
    © 2026 맛집모아모아. All rights reserved.
</footer>

</body>
</html>
