<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>관리자 문의 상세</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />
</head>

<body class="bg-base-200 min-h-screen">

<div class="container mx-auto py-10">

    <div class="card bg-base-100 shadow-xl">

        <div class="card-body">

            <div class="flex justify-between items-center">

                <h1 class="text-4xl font-bold">
                    문의 상세
                </h1>

                <a href="/admin/inquiry-list"
                   class="btn btn-primary">
                    목록으로
                </a>

            </div>

            <div class="divider"></div>

            <div class="overflow-x-auto">

                <table class="table table-zebra">

                    <tbody>

                    <tr>
                        <th class="w-40">번호</th>
                        <td th:text="${inquiry.no}"></td>
                    </tr>

                    <tr>
                        <th>회원번호</th>
                        <td th:text="${inquiry.memberNo}"></td>
                    </tr>

                    <tr>
                        <th>유형</th>
                        <td>

                            <span th:switch="${inquiry.category}">

                                <span th:case="'GENERAL'">
                                    일반문의
                                </span>

                                <span th:case="'ACCOUNT'">
                                    계정문의
                                </span>

                                <span th:case="'BOARD'">
                                    게시판문의
                                </span>

                                <span th:case="'RESTAURANT'">
                                    맛집문의
                                </span>

                                <span th:case="'REPORT'">
                                    신고문의
                                </span>

                                <span th:case="'BUG'">
                                    버그신고
                                </span>

                                <span th:case="'ETC'">
                                    기타
                                </span>

                            </span>

                        </td>
                    </tr>

                    <tr>
                        <th>제목</th>
                        <td th:text="${inquiry.title}"></td>
                    </tr>

                    <tr>
                        <th>내용</th>

                        <td style="white-space: pre-line;"
                            th:text="${inquiry.content}">
                        </td>
                    </tr>

                    <tr>
                        <th>전화번호</th>
                        <td th:text="${inquiry.phone}"></td>
                    </tr>

                    <tr>
                        <th>상태</th>

                        <td>

                            <span th:if="${inquiry.status == 'WAITING'}"
                                  class="badge badge-error">

                                답변대기

                            </span>

                            <span th:if="${inquiry.status == 'ANSWERED'}"
                                  class="badge badge-success">

                                답변완료

                            </span>

                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

            <div class="divider"></div>

            <h2 class="text-2xl font-bold">
                관리자 답변
            </h2>

            <!-- 답변 완료 / 수정 -->

            <div th:if="${answer != null}"
                 class="card bg-base-200 mt-4">

                <div class="card-body">

                    <div class="badge badge-success mb-2">
                        답변 완료
                    </div>

                    <form action="/admin/inquiry-answer-update"
                          method="post">

                        <input type="hidden"
                               name="no"
                               th:value="${answer.no}">

                        <input type="hidden"
                               name="inquiryNo"
                               th:value="${inquiry.no}">

                        <label class="label">
                <span class="label-text">
                    답변 내용
                </span>
                        </label>

                        <textarea name="content"
                                  rows="8"
                                  required
                                  class="textarea textarea-bordered w-full"
                                  th:text="${answer.content}">
            </textarea>

                        <div class="text-sm text-gray-500 mt-3">

                <span>
                    등록일 :
                </span>

                            <span th:text="${#temporals.format(answer.regDate,'yyyy-MM-dd HH:mm')}">
                </span>

                            <span th:if="${answer.updateDate != null}">
                    / 수정일 :
                </span>

                            <span th:if="${answer.updateDate != null}"
                                  th:text="${#temporals.format(answer.updateDate,'yyyy-MM-dd HH:mm')}">
                </span>

                        </div>

                        <button type="submit"
                                class="btn btn-primary mt-4"
                                onclick="return confirm('답변을 수정하시겠습니까?');">

                            답변 수정

                        </button>

                    </form>

                </div>

            </div>

            <!-- 답변 작성 -->

            <div th:if="${answer == null}"
                 class="card bg-base-200 mt-4">

                <div class="card-body">

                    <div class="badge badge-error mb-3">
                        답변 대기
                    </div>

                    <form action="/admin/inquiry-answer"
                          method="post">

                        <input type="hidden"
                               name="inquiryNo"
                               th:value="${inquiry.no}"/>

                        <label class="label">
                            <span class="label-text">
                                답변 내용
                            </span>
                        </label>

                        <textarea name="content"
                                  rows="8"
                                  required
                                  class="textarea textarea-bordered w-full">
                        </textarea>

                        <button type="submit"
                                class="btn btn-primary mt-4">

                            답변 등록

                        </button>

                    </form>

                </div>

            </div>

            <div class="divider"></div>

            <div class="flex gap-3">

                <a href="/admin/inquiry-list"
                   class="btn btn-outline btn-primary">

                    목록으로

                </a>

                <a href="/admin"
                   class="btn btn-primary">

                    관리자 홈

                </a>

            </div>

        </div>

    </div>

</div>

</body>
</html>
