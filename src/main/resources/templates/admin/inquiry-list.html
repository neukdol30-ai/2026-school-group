<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>관리자 - 1:1 문의 관리</title>

    <style>
        table {
            border-collapse: collapse;
            width: 100%;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }

        th {
            background: #f5f5f5;
        }

        .waiting {
            color: red;
            font-weight: bold;
        }

        .answered {
            color: blue;
            font-weight: bold;
        }

        .title {
            text-align: left;
        }

        .title a {
            text-decoration: none;
            color: black;
        }

        .title a:hover {
            text-decoration: underline;
        }

        .top {
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

<h2>1:1 문의 관리 (관리자)</h2>

<div class="top">
    <a href="/admin">관리자 홈</a>
</div>

<table>

    <tr>
        <th>번호</th>
        <th>회원번호</th>
        <th>유형</th>
        <th>제목</th>
        <th>내용</th>
        <th>상태</th>
        <th>작성일</th>
        <th>관리</th>
    </tr>

    <tr th:each="inquiry : ${inquiryList}">

        <td th:text="${inquiry.no}"></td>

        <td th:text="${inquiry.memberNo}"></td>

        <!-- 유형 한글 -->
        <td>
            <span th:switch="${inquiry.category}">
                <span th:case="'GENERAL'">일반문의</span>
                <span th:case="'ACCOUNT'">계정문의</span>
                <span th:case="'BOARD'">게시판문의</span>
                <span th:case="'RESTAURANT'">맛집문의</span>
                <span th:case="'REPORT'">신고문의</span>
                <span th:case="'BUG'">버그신고</span>
                <span th:case="'ETC'">기타</span>
            </span>
        </td>

        <!-- 제목 -->
        <td class="title">
            <a th:href="@{/admin/inquiry-detail(no=${inquiry.no})}"
               th:text="${inquiry.title}">
            </a>
        </td>

        <!-- 내용 미리보기 -->
        <td style="text-align:left;">
            <span th:text="${#strings.abbreviate(inquiry.content, 25)}"></span>
        </td>

        <!-- 상태 -->
        <td>
            <span th:switch="${inquiry.status}">
                <span th:case="'WAITING'" class="waiting">답변대기</span>
                <span th:case="'ANSWERED'" class="answered">답변완료</span>
            </span>
        </td>

        <td th:text="${#temporals.format(inquiry.regDate, 'yyyy-MM-dd HH:mm')}"></td>

        <!-- 관리 -->
        <td>
            <a th:href="@{/admin/inquiry-detail(no=${inquiry.no})}">
                상세 / 답변
            </a>
        </td>

    </tr>

</table>

</body>
</html>
