<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>자유게시판 상세보기</title>

    <style>
        * { margin:0; padding:0; box-sizing:border-box; }

        body{
            font-family:Arial,"Noto Sans KR",sans-serif;
            background:#f3f4f6;
            color:#222;
        }

        a{
            text-decoration:none;
            color:inherit;
        }

        ul{
            list-style:none;
        }

        header{
            background:#fff;
            border-bottom:1px solid #ddd;
        }

        .top-bar{
            height:36px;
            border-bottom:1px solid #eee;
            font-size:13px;
        }

        .top-inner{
            max-width:1200px;
            height:100%;
            margin:0 auto;
            padding:0 20px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .top-menu{
            display:flex;
            gap:18px;
        }

        .brand-area{
            max-width:1200px;
            height:110px;
            margin:0 auto;
            padding:0 20px;
            display:flex;
            align-items:center;
            justify-content:space-between;
        }

        .logo{
            font-size:34px;
            font-weight:800;
            color:#2563eb;
        }

        .logo span{
            color:#111827;
        }

        .search-box{
            width:420px;
            height:48px;
            border:2px solid #2563eb;
            border-radius:999px;
            display:flex;
            align-items:center;
            padding:0 18px;
        }

        .search-box input{
            flex:1;
            border:none;
            outline:none;
        }

        .nav-area{
            border-top:1px solid #eee;
            background:#fff;
        }

        .nav-inner{
            max-width:1200px;
            height:58px;
            margin:0 auto;
            padding:0 20px;
            display:flex;
            align-items:center;
        }

        .main-menu{
            display:flex;
            gap:38px;
            font-size:17px;
            font-weight:700;
        }

        .main-menu a.active{
            color:#2563eb;
        }

        main{
            max-width:1200px;
            margin:30px auto;
            padding:0 20px;
        }

        .content-grid{
            display:grid;
            grid-template-columns:260px 1fr;
            gap:24px;
        }

        aside{
            background:#fff;
            border:1px solid #ddd;
            border-radius:12px;
            overflow:hidden;
            height:fit-content;
        }

        aside h2{
            padding:18px 20px;
            background:#111827;
            color:#fff;
        }

        aside a{
            display:block;
            padding:14px 20px;
            border-bottom:1px solid #eee;
            font-weight:600;
        }

        aside a.active{
            background:#f3f4f6;
            color:#2563eb;
        }

        .view-card{
            background:#fff;
            border:1px solid #ddd;
            border-radius:14px;
            padding:30px;
        }

        .view-top{
            display:flex;
            justify-content:space-between;
            align-items:flex-start;
            border-bottom:1px solid #eee;
            padding-bottom:20px;
        }

        .view-title h1{
            font-size:32px;
            margin-bottom:10px;
        }

        .meta{
            display:flex;
            gap:12px;
            color:#64748b;
            font-size:14px;
            flex-wrap:wrap;
        }

        .like-area{
            margin-top:20px;
        }

        .like-btn{
            border:none;
            background:#dbeafe;
            color:#2563eb;
            padding:10px 16px;
            border-radius:999px;
            cursor:pointer;
            font-weight:700;
        }

        .content-box{
            margin-top:25px;
            padding:25px;
            border:1px solid #e5e7eb;
            border-radius:12px;
            min-height:250px;
            line-height:1.8;
            white-space:pre-line;
        }

        .comment-section{
            margin-top:30px;
            border-top:1px solid #eee;
            padding-top:25px;
        }

        .bottom-actions{
            margin-top:30px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .btn{
            padding:12px 20px;
            border-radius:10px;
            font-weight:700;
        }

        .btn-list{
            background:#111827;
            color:white;
        }

        .btn-edit{
            background:#2563eb;
            color:white;
        }

        .btn-delete{
            background:#ef4444;
            color:white;
        }
        .comment-empty{
            padding:24px;
            border:1px solid #e5e7eb;
            border-radius:10px;
            text-align:center;
            background:#f8fafc;
            margin-bottom:15px;
        }

        .comment-item{
            padding:18px;
            border:1px solid #e5e7eb;
            border-radius:10px;
            background:#fff;
            margin-bottom:12px;
        }

        .comment-meta{
            display:flex;
            justify-content:space-between;
            color:#64748b;
            font-size:13px;
            margin-bottom:10px;
        }

        .comment-content{
            line-height:1.7;
        }

        .comment-form{
            margin-top:20px;
            display:flex;
            gap:10px;
        }

        .comment-form textarea{
            flex:1;
            min-height:90px;
            padding:12px;
            border:1px solid #d1d5db;
            border-radius:10px;
        }

        .comment-form button{
            width:110px;
            border:none;
            border-radius:10px;
            background:#2563eb;
            color:white;
            font-weight:bold;
            cursor:pointer;
        }

    </style>
</head>

<body>

<header>

    <div class="top-bar">
        <div class="top-inner">

            <div class="top-menu">
                <a href="/">홈</a>
                <a href="/notice">공지사항</a>
            </div>

            <!-- 비회원 -->
            <div class="top-menu"
                 th:if="${session.loginUser == null}">
                <a href="/member/login">로그인</a>
                <a href="/member/signup">회원가입</a>
            </div>

            <!-- 회원 -->
            <div class="top-menu"
                 th:if="${session.loginUser != null}">

                <span>
                    <span th:text="${session.loginUser.name}"></span>님
                </span>

                <a href="/member/mypage">내정보</a>
                <a href="/member/logout">로그아웃</a>

            </div>

        </div>
    </div>

    <div class="brand-area">

        <a href="/" class="logo">
            맛집<span>모아모아</span>
        </a>



    </div>

    <nav class="nav-area">
        <div class="nav-inner">

            <ul class="main-menu">
                <li><a href="/">🏠</a></li>
                <li><a href="/board/list" class="active">자유게시판</a></li>
                <li><a href="/photoBoard/list">인증게시판</a></li>
                <li><a href="/member/mypage">내정보</a></li>
            </ul>

        </div>
    </nav>

</header>

<main>

    <section class="content-grid">

        <aside>

            <h2>메뉴</h2>

            <a href="/">홈</a>
            <a href="/board/list" class="active">자유게시판</a>
            <a href="/photoBoard/list">인증게시판</a>
            <a href="/member/mypage">내정보</a>

        </aside>

        <section class="view-card">

            <div class="view-top">

                <div class="view-title">

                    <h1 th:text="${board.title}">
                        게시글 제목
                    </h1>

                    <div class="meta">

                    <span>
                        번호 :
                        <b th:text="${board.no}"></b>
                    </span>

                        <span>
                        작성자 :
                        <b th:text="${board.name}"></b>
                    </span>

                        <span>
                        조회수 :
                        <b th:text="${board.hit}"></b>
                    </span>

                        <span th:text="${board.regDate}">
                    </span>

                    </div>

                </div>

                <a href="/board/list"
                   class="btn btn-list">
                    목록
                </a>

            </div>

            <div class="like-area">

                <button type="button"
                        id="likeBtn"
                        class="like-btn"
                        onclick="toggleLike()">

                    추천

                </button>

                <span id="likeCount"
                      th:text="${board.likeCount}">
                0
            </span>

            </div>

            <div class="content-box"
                 th:text="${board.content}">
            </div>

            <div class="comment-section">

                <h2>댓글</h2>

                <input type="hidden"
                       id="boardNo"
                       th:value="${board.no}">

                <div id="commentList">
                </div>
                <div class="comment-form">

                <textarea id="commentContent"
                          placeholder="댓글을 입력하세요.">
                </textarea>

                    <button type="button"
                            onclick="writeComment()">

                        댓글 등록

                    </button>

                </div>

            </div>

            <div class="bottom-actions">

                <a href="/board/list"
                   class="btn btn-list">

                    목록

                </a>

                <div>

                    <a th:href="@{/board/edit(no=${board.no})}"
                       class="btn btn-edit">

                        수정

                    </a>

                    <a th:href="@{/board/delete(no=${board.no})}"
                       class="btn btn-delete"
                       onclick="return confirm('정말 삭제하시겠습니까?')">

                        삭제

                    </a>

                </div>

            </div>

        </section>

    </section>

</main>

<footer
        style="
        margin-top:60px;
        padding:30px;
        text-align:center;
        color:#777;
        background:#fff;
        border-top:1px solid #ddd;
    ">

    © 2026 맛집모아모아. All rights reserved.

</footer>

<script>

    const boardNo =
        document.getElementById("boardNo").value;

    function loadCommentList() {

        fetch("/board/api/comment/list?boardNo=" + boardNo)

            .then(response => response.json())

            .then(data => {

                const commentList =
                    document.getElementById("commentList");

                commentList.innerHTML = "";

                if(data.length === 0){

                    commentList.innerHTML =
                        `
                    <div class="comment-empty">
                        등록된 댓글이 없습니다.
                    </div>
                    `;

                    return;
                }

                for(let i=0;i<data.length;i++){

                    const comment = data[i];

                    commentList.innerHTML +=
                        `
                    <div class="comment-item">

                        <div class="comment-meta">

                            <span>
                                작성자 :
                                <b>${comment.name}</b>
                            </span>

                            <span>
                                ${comment.regDate}
                            </span>

                        </div>

                        <div class="comment-content">

                            ${comment.content}

                        </div>

                        <div style="margin-top:10px">

                            <button
                                type="button"
                                onclick="deleteComment(${comment.no})"
                                style="
                                    border:none;
                                    background:#ef4444;
                                    color:white;
                                    padding:8px 12px;
                                    border-radius:8px;
                                    cursor:pointer;
                                ">

                                삭제

                            </button>

                        </div>

                    </div>
                    `;
                }
            });
    }

    function writeComment(){

        const contentInput =
            document.getElementById("commentContent");

        const content =
            contentInput.value.trim();

        if(content === ""){

            alert("댓글 내용을 입력하세요.");

            return;
        }

        fetch("/board/api/comment/write",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                boardNo:parseInt(boardNo),
                content:content

            })

        })
            .then(()=>{

                contentInput.value="";

                loadCommentList();

            });
    }

    function deleteComment(no){

        if(!confirm("댓글을 삭제하시겠습니까?")){

            return;
        }

        fetch("/board/api/comment/delete?no=" + no,{

            method:"POST"

        })
            .then(()=>{

                loadCommentList();

            });
    }

    function loadLikeInfo(){

        fetch("/board/api/like?boardNo=" + boardNo)

            .then(response => response.json())

            .then(data => {

                document.getElementById("likeCount").innerText =
                    data.likeCount;

                document.getElementById("likeBtn").innerText =
                    data.liked ? "추천 취소" : "추천";

            });
    }

    function toggleLike(){

        fetch("/board/api/like?boardNo=" + boardNo,{

            method:"POST"

        })

            .then(response => response.json())

            .then(data => {

                document.getElementById("likeCount").innerText =
                    data.likeCount;

                document.getElementById("likeBtn").innerText =
                    data.liked ? "추천 취소" : "추천";

            });
    }

    loadCommentList();
    loadLikeInfo();

</script>

</body>
</html>
