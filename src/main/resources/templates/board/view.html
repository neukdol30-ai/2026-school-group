<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>상세보기</title>
</head>
<body>

<h1>자유게시판 - 상세보기</h1>

<table border="1">
    <tr>
        <th>번호</th>
        <td th:text="${board.no}"></td>
    </tr>
    <tr>
        <th>머릿말</th>
        <td th:text="${board.category}"></td>
    </tr>
    <tr>
        <th>제목</th>
        <td th:text="${board.title}"></td>
    </tr>
    <tr>
        <th>작성자</th>
        <td th:text="${board.name}"></td>
    </tr>
    <tr>
        <th>조회수</th>
        <td th:text="${board.hit}"></td>
    </tr>
    <tr>
        <th>작성일</th>
        <td th:text="${board.regDate}"></td>
    </tr>
    <tr>
        <th>내용</th>
        <td th:text="${board.content}"></td>
    </tr>
</table>
<a th:href="@{/board/list}">목록</a>
<a th:href="@{/board/edit(no=${board.no})}">수정</a>
<a th:href="@{/board/delete(no=${board.no})}" onclick="return confirm('정말 삭제하시겠습니까?')">삭제</a>

<div>
    <button type="button" id="likeBtn" onclick="toggleLike()">추천</button>
    <span id="likeCount" th:text="${board.likeCount}">0</span>
</div>

<hr>

<h2>댓글</h2>

<input type="hidden" id="boardNo" th:value="${board.no}">

<table border="1">
    <tr>
        <td>
            <textarea id="commentContent"
                      rows="3"
                      cols="60"
                      placeholder="댓글을 입력하세요."></textarea>
        </td>
        <td>
            <button type="button" onclick="writeComment()">댓글 등록</button>
        </td>
    </tr>
</table>

<br>

<table border="1">
    <thead>
    <tr>
        <th>작성자 ID</th>
        <th>내용</th>
        <th>작성일</th>
        <th>삭제</th>
    </tr>
    </thead>

    <tbody id="commentList">

    </tbody>
</table>
<script>
    const boardNo = document.getElementById("boardNo").value;

    function loadCommentList() {
        fetch("/board/api/comment/list?boardNo=" + boardNo)
            .then(response => response.json())
            .then(data => {
                const commentList = document.getElementById("commentList");
                commentList.innerHTML = "";

                for (let i = 0; i < data.length; i++) {
                    const comment = data[i];

                    commentList.innerHTML +=
                        "<tr>" +
                        "<td>" + comment.memberId + "</td>" +
                        "<td>" + comment.content + "</td>" +
                        "<td>" + comment.regDate + "</td>" +
                        "<td><button type='button' onclick='deleteComment(" + comment.no + ")'>삭제</button></td>" +
                        "</tr>";
                }
            });
    }

    function writeComment() {
        const contentInput = document.getElementById("commentContent");
        const content = contentInput.value.trim();

        if (content === "") {
            alert("댓글 내용을 입력하세요.");
            return;
        }

        fetch("/board/api/comment/write", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                boardNo: parseInt(boardNo),
                content: content
            })
        }).then(() => {
            contentInput.value = "";
            loadCommentList();
        });
    }

    function deleteComment(no) {
        if (!confirm("댓글을 삭제하시겠습니까?")) {
            return;
        }

        fetch("/board/api/comment/delete?no=" + no, {
            method: "POST"
        }).then(() => {
            loadCommentList();
        });
    }

    function loadLikeInfo() {
        fetch("/board/api/like?boardNo=" + boardNo)
            .then(response => response.json())
            .then(data => {
                document.getElementById("likeCount").innerText = data.likeCount;
                document.getElementById("likeBtn").innerText = data.liked ? "추천 취소" : "추천";
            });
    }

    function toggleLike() {
        fetch("/board/api/like?boardNo=" + boardNo, {
            method: "POST"
        })
            .then(response => response.json())
            .then(data => {
                document.getElementById("likeCount").innerText = data.likeCount;
                document.getElementById("likeBtn").innerText
                    = data.liked ? "추천 취소" : "추천";
            })
    }

    loadCommentList();
    loadLikeInfo();
</script>
</body>
</html>
