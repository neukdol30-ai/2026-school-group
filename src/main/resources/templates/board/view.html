<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>자유게시판 상세보기</title>

    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" th:href="@{/css/board/view.css}">
</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<main>

    <section class="content-grid">

        <aside>

            <h2>메뉴</h2>

            <a href="/">홈</a>
            <a href="/board/list" class="active">자유게시판</a>
            <a href="/photoBoard/list">인증게시판</a>
            <a href="/member/mypage">내정보</a>

        </aside>

        <section class="view-card">

            <div class="view-top">

                <div class="view-title">

                    <h1 th:text="${board.title}">
                        게시글 제목
                    </h1>

                    <div class="meta">
                        <span>번호 : <b th:text="${board.no}"></b></span>
                        <span>작성자 : <b th:text="${board.name}"></b></span>
                        <span>조회수 : <b th:text="${board.hit}"></b></span>
                        <span th:text="${board.regDate}"></span></div>
                </div>

                <!-- 평점 표시 추가 -->
                <div class="meta" style="margin-top:8px;">
                    <span>맛 : <b th:text="${board.tasteRating}">점</b></span>
                    <span>시설 : <b th:text="${board.facilityRating}">점</b></span>
                    <span>서비스 : <b th:text="${board.serviceRating}">점</b></span>
                    <span>평균 : <b th:text="${board.rating}">점</b></span>
                </div>

                <a href="/board/list"
                   class="btn btn-list">
                    목록
                </a>

            </div>

            <div class="like-area">

                <button type="button"
                        id="likeBtn"
                        class="like-btn"
                        onclick="toggleLike()">

                    추천

                </button>

                <span id="likeCount"
                      th:text="${board.likeCount}">
                0
            </span>
                <a th:href="@{/report/write(
        targetType='BOARD',
        targetNo=${board.no},
        returnUrl=${'/board/view?no=' + board.no}
   )}"
                   class="btn btn-delete"
                   style="margin-left:10px;">
                    게시글 신고
                </a>

            </div>

            <div class="content-box"
                 th:text="${board.content}">
            </div>

            <div class="comment-section">

                <h2>댓글</h2>

                <input type="hidden"
                       id="boardNo"
                       th:value="${board.no}">

                <div id="commentList">
                </div>
                <div class="comment-form">

                <textarea id="commentContent"
                          placeholder="댓글을 입력하세요.">
                </textarea>

                    <button type="button"
                            onclick="writeComment()">

                        댓글 등록

                    </button>

                </div>

            </div>

            <div class="bottom-actions">

                <a href="/board/list"
                   class="btn btn-list">

                    목록

                </a>

                <div>

                    <a th:href="@{/board/edit(no=${board.no})}"
                       class="btn btn-edit">

                        수정

                    </a>

                    <a th:href="@{/board/delete(no=${board.no})}"
                       class="btn btn-delete"
                       onclick="return confirm('정말 삭제하시겠습니까?')">

                        삭제

                    </a>

                </div>

            </div>

        </section>

    </section>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script>

    const boardNo =
        document.getElementById("boardNo").value;

    function loadCommentList() {

        fetch("/board/api/comment/list?boardNo=" + boardNo)

            .then(response => response.json())

            .then(data => {

                const commentList =
                    document.getElementById("commentList");

                commentList.innerHTML = "";

                if (data.length === 0) {

                    commentList.innerHTML =
                        `
                    <div class="comment-empty">
                        등록된 댓글이 없습니다.
                    </div>
                    `;

                    return;
                }

                for (let i = 0; i < data.length; i++) {

                    const comment = data[i];

                    commentList.innerHTML +=
                        `
                    <div class="comment-item">

                        <div class="comment-meta">

                            <span>
                                작성자 :
                                <b>${comment.name}</b>
                            </span>

                            <span>
                                ${comment.regDate}
                            </span>

                        </div>

                        <div class="comment-content">

                            ${comment.content}

                        </div>

                        <div style="margin-top:10px">

                            <button
                                type="button"
                                onclick="deleteComment(${comment.no})"
                                style="
                                    border:none;
                                    background:#ef4444;
                                    color:white;
                                    padding:8px 12px;
                                    border-radius:8px;
                                    cursor:pointer;
                                ">

                                삭제

                            </button>
                            <a
    href="/report/write?targetType=COMMENT&targetNo=${comment.no}&returnUrl=/board/view?no=${boardNo}"
    style="
        margin-left:8px;
        color:#f97316;
        font-weight:700;
    ">
    신고
</a>

                        </div>

                    </div>
                    `;
                }
            });
    }

    function writeComment() {

        const contentInput =
            document.getElementById("commentContent");

        const content =
            contentInput.value.trim();

        if (content === "") {

            alert("댓글 내용을 입력하세요.");

            return;
        }

        fetch("/board/api/comment/write", {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({

                boardNo: parseInt(boardNo),
                content: content

            })

        })
            .then(() => {

                contentInput.value = "";

                loadCommentList();

            });
    }

    function deleteComment(no) {

        if (!confirm("댓글을 삭제하시겠습니까?")) {

            return;
        }

        fetch("/board/api/comment/delete?no=" + no, {

            method: "POST"

        })
            .then(() => {

                loadCommentList();

            });
    }

    function loadLikeInfo() {

        fetch("/board/api/like?boardNo=" + boardNo)

            .then(response => response.json())

            .then(data => {

                document.getElementById("likeCount").innerText =
                    data.likeCount;

                document.getElementById("likeBtn").innerText =
                    data.liked ? "추천 취소" : "추천";

            });
    }

    function toggleLike() {

        fetch("/board/api/like?boardNo=" + boardNo, {

            method: "POST"

        })

            .then(response => response.json())

            .then(data => {

                document.getElementById("likeCount").innerText =
                    data.likeCount;

                document.getElementById("likeBtn").innerText =
                    data.liked ? "추천 취소" : "추천";

            });
    }

    loadCommentList();
    loadLikeInfo();

</script>



</body>
</html>
