<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>자유게시판 글 수정</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: Arial, "Noto Sans KR", sans-serif;
            background-color:#f3f4f6;
            color:#222;
        }

        a{
            text-decoration:none;
            color:inherit;
        }

        ul{
            list-style:none;
        }

        header{
            background:#fff;
            border-bottom:1px solid #ddd;
        }

        .top-bar{
            height:36px;
            border-bottom:1px solid #eee;
            font-size:13px;
            color:#666;
        }

        .top-inner{
            max-width:1500px;
            height:100%;
            margin:0 auto;
            padding:0 20px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .top-menu{
            display:flex;
            gap:18px;
        }

        .top-menu a:hover{
            color:#2563eb;
        }

        .brand-area{
            max-width:1500px;
            height:110px;
            margin:0 auto;
            padding:0 20px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .logo{
            font-size:34px;
            font-weight:800;
            color:#2563eb;
        }

        .logo span{
            color:#111827;
        }

        .notice{
            font-size:14px;
            color:#444;
        }

        .nav-area{
            border-top:1px solid #eee;
            background:#fff;
        }

        .nav-inner{
            max-width:1500px;
            height:58px;
            margin:0 auto;
            padding:0 20px;
            display:flex;
            align-items:center;
        }

        .main-menu{
            display:flex;
            gap:38px;
            font-size:17px;
            font-weight:700;
        }

        .main-menu a{
            position:relative;
            padding:18px 0;
        }

        .main-menu a.active{
            color:#2563eb;
        }

        .main-menu a.active::after{
            content:"";
            position:absolute;
            left:0;
            bottom:10px;
            width:100%;
            height:3px;
            background:#2563eb;
            border-radius:999px;
        }

        main{
            max-width:1500px;
            margin:30px auto;
            padding:0 20px;
        }

        .content-grid{
            display:grid;
            grid-template-columns:260px 1fr;
            gap:32px;
        }

        aside{
            background:#fff;
            border:1px solid #ddd;
            border-radius:12px;
            overflow:hidden;
            height:fit-content;
        }

        aside h2{
            padding:18px 20px;
            background:#111827;
            color:white;
            font-size:18px;
        }

        aside a{
            display:block;
            padding:14px 20px;
            border-bottom:1px solid #eee;
            font-weight:600;
        }

        aside a:hover,
        aside a.active{
            background:#f3f4f6;
            color:#2563eb;
        }

        .write-card{
            background:white;
            border:1px solid #ddd;
            border-radius:14px;
            padding:36px 40px;
        }

        .write-title{
            border-bottom:1px solid #eee;
            padding-bottom:22px;
            margin-bottom:26px;
        }

        .write-title h1{
            font-size:32px;
            margin-bottom:10px;
        }

        .write-title p{
            color:#64748b;
        }

        .form-control{
            margin-bottom:18px;
        }

        .form-control label{
            display:block;
            margin-bottom:8px;
            font-weight:800;
        }

        .form-row{
            display:grid;
            grid-template-columns:1fr 1fr 1fr;
            gap:16px;
        }

        input,
        select,
        textarea{
            width:100%;
            border:1px solid #d1d5db;
            border-radius:10px;
            padding:13px 14px;
            font-size:15px;
            outline:none;
        }

        input:focus,
        select:focus,
        textarea:focus{
            border-color:#2563eb;
            box-shadow:0 0 0 3px rgba(37,99,235,.12);
        }

        textarea{
            min-height:300px;
            resize:vertical;
            line-height:1.7;
        }

        .bottom-actions{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-top:26px;
            padding-top:22px;
            border-top:1px solid #eee;
        }

        .btn{
            border:none;
            padding:12px 22px;
            border-radius:9px;
            font-weight:800;
            cursor:pointer;
            display:inline-block;
        }

        .btn-list{
            background:#111827;
            color:white;
        }

        .btn-cancel{
            background:#f1f5f9;
            color:#334155;
        }

        .btn-submit{
            background:#2563eb;
            color:white;
        }

        .right-actions{
            display:flex;
            gap:10px;
        }

        footer{
            margin-top:60px;
            padding:30px;
            text-align:center;
            color:#777;
            background:white;
            border-top:1px solid #ddd;
        }
    </style>
</head>

<body>

<header>
    <div class="top-bar">
        <div class="top-inner">
            <div class="top-menu">
                <a href="/">홈</a>
                <a href="/notice">공지사항</a>
            </div>

            <!-- 비회원 -->
            <div class="top-menu"
                 th:if="${session.loginUser == null}">
                <a href="/member/login">로그인</a>
                <a href="/member/signup">회원가입</a>
            </div>

            <!-- 회원 -->
            <div class="top-menu"
                 th:if="${session.loginUser != null}">

                <span>
                     <span th:text="${session.loginUser.name}"></span>님
                </span>

                <a href="/member/mypage">내정보</a>
                <a href="/member/logout">로그아웃</a>

            </div>
        </div>
    </div>

    <div class="brand-area">
        <a href="/" class="logo">
            맛집<span>모아모아</span>
        </a>

        <div class="notice">
            <strong>맛집 추천 사이트</strong>
        </div>
    </div>

    <nav class="nav-area">
        <div class="nav-inner">
            <ul class="main-menu">
                <li><a href="/">🏠</a></li>
                <li><a href="/board/list" class="active">자유게시판</a></li>
                <li><a href="/photoBoard/list">인증게시판</a></li>
                <li><a href="/member/mypage">내정보</a></li>
            </ul>
        </div>
    </nav>
</header>

<main>

    <section class="content-grid">

        <aside>
            <h2>메뉴</h2>

            <a href="/">홈</a>
            <a href="/board/list" class="active">자유게시판</a>
            <a href="/photoBoard/list">인증게시판</a>
            <a href="/member/mypage">내정보</a>
        </aside>

        <section class="write-card">

            <div class="write-title">
                <h1>자유게시판 글 수정</h1>
                <p>작성한 게시글 내용을 수정할 수 있습니다.</p>
            </div>

            <form action="/board/edit" method="post">

                <input type="hidden"
                       name="no"
                       th:value="${board.no}">

                <div class="form-control">
                    <label>머릿말</label>

                    <select name="category">
                        <option value="잡담"
                                th:selected="${board.category == '잡담'}">
                            잡담
                        </option>

                        <option value="질문"
                                th:selected="${board.category == '질문'}">
                            질문
                        </option>

                        <option value="정보"
                                th:selected="${board.category == '정보'}">
                            정보
                        </option>
                    </select>
                </div>

                <div class="form-control">
                    <label>제목</label>

                    <input type="text"
                           name="title"
                           th:value="${board.title}">
                </div>

                <div class="form-row">

                    <div class="form-control">
                        <label>맛 평점</label>

                        <select name="tasteRating">
                            <option value="5" th:selected="${board.tasteRating == 5}">5점</option>
                            <option value="4" th:selected="${board.tasteRating == 4}">4점</option>
                            <option value="3" th:selected="${board.tasteRating == 3}">3점</option>
                            <option value="2" th:selected="${board.tasteRating == 2}">2점</option>
                            <option value="1" th:selected="${board.tasteRating == 1}">1점</option>
                        </select>
                    </div>

                    <div class="form-control">
                        <label>시설 평점</label>

                        <select name="facilityRating">
                            <option value="5" th:selected="${board.facilityRating == 5}">5점</option>
                            <option value="4" th:selected="${board.facilityRating == 4}">4점</option>
                            <option value="3" th:selected="${board.facilityRating == 3}">3점</option>
                            <option value="2" th:selected="${board.facilityRating == 2}">2점</option>
                            <option value="1" th:selected="${board.facilityRating == 1}">1점</option>
                        </select>
                    </div>

                    <div class="form-control">
                        <label>서비스 평점</label>

                        <select name="serviceRating">
                            <option value="5" th:selected="${board.serviceRating == 5}">5점</option>
                            <option value="4" th:selected="${board.serviceRating == 4}">4점</option>
                            <option value="3" th:selected="${board.serviceRating == 3}">3점</option>
                            <option value="2" th:selected="${board.serviceRating == 2}">2점</option>
                            <option value="1" th:selected="${board.serviceRating == 1}">1점</option>
                        </select>
                    </div>

                </div>

                <div class="form-control">
                    <label>내용</label>

                    <textarea name="content"
                              th:text="${board.content}">
                    </textarea>
                </div>

                <div class="bottom-actions">

                    <a th:href="@{/board/list}"
                       class="btn btn-list">
                        목록으로
                    </a>

                    <div class="right-actions">

                        <a th:href="@{/board/list}"
                           class="btn btn-cancel">
                            취소
                        </a>

                        <button type="submit"
                                class="btn btn-submit">
                            수정 완료
                        </button>

                    </div>

                </div>

</form>

        </section>

    </section>

</main>

<footer>
    © 2026 맛집모아모아. All rights reserved.
</footer>

</body>
</html>
