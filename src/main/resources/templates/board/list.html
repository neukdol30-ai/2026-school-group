<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>자유게시판</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, "Noto Sans KR", sans-serif;
            background-color: #f3f4f6;
            color: #222;
        }

        a { text-decoration: none; color: inherit; }
        ul { list-style: none; }

        header {
            background-color: #fff;
            border-bottom: 1px solid #ddd;
        }

        .top-bar {
            height: 36px;
            border-bottom: 1px solid #eee;
            font-size: 13px;
            color: #666;
        }

        .top-inner {
            max-width: 1200px;
            height: 100%;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .top-menu {
            display: flex;
            gap: 18px;
        }

        .top-menu a:hover { color: #2563eb; }

        .brand-area {
            max-width: 1200px;
            height: 110px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 34px;
            font-weight: 800;
            color: #2563eb;
        }

        .logo span { color: #111827; }

        .search-box {
            width: 420px;
            height: 48px;
            border: 2px solid #2563eb;
            border-radius: 999px;
            display: flex;
            align-items: center;
            padding: 0 18px;
            gap: 10px;
        }

        .search-box input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 15px;
        }

        .search-box button {
            border: none;
            background: none;
            font-size: 22px;
            cursor: pointer;
        }

        .notice {
            font-size: 14px;
            color: #444;
        }

        .nav-area {
            border-top: 1px solid #eee;
            background-color: #fff;
        }

        .nav-inner {
            max-width: 1200px;
            height: 58px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
        }

        .main-menu {
            display: flex;
            gap: 38px;
            font-size: 17px;
            font-weight: 700;
        }

        .main-menu a {
            position: relative;
            padding: 18px 0;
        }

        .main-menu a:hover,
        .main-menu a.active {
            color: #2563eb;
        }

        .main-menu a.active::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: 10px;
            width: 100%;
            height: 3px;
            background-color: #2563eb;
            border-radius: 999px;
        }

        main {
            max-width: 1500px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .page-title {
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .page-title h1 {
            font-size: 30px;
            margin-bottom: 10px;
        }

        .page-title p {
            color: #666;
        }

        .write-btn {
            background-color: #2563eb;
            color: white;
            padding: 13px 22px;
            border-radius: 999px;
            font-weight: 700;
        }

        .write-btn:hover {
            background-color: #1d4ed8;
        }

        .content-grid {
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 32px;
        }

        aside {
            background-color: #fff;
            border-radius: 12px;
            border: 1px solid #ddd;
            overflow: hidden;
            height: fit-content;
        }

        aside h2 {
            padding: 18px 20px;
            background-color: #111827;
            color: white;
            font-size: 18px;
        }

        aside a {
            display: block;
            padding: 14px 20px;
            border-bottom: 1px solid #eee;
            font-weight: 600;
        }

        aside a:hover,
        aside a.active {
            background-color: #f3f4f6;
            color: #2563eb;
        }

        .board-box {
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 36px 40px;
        }

        .board-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            gap: 16px;
        }

        .board-top h2 {
            font-size: 24px;
            font-weight: 800;
        }

        .search-form {
            display: flex;
            gap: 8px;
        }

        .search-form input {
            width: 240px;
            height: 38px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 0 12px;
            outline: none;
        }

        .search-form input:focus {
            border-color: #2563eb;
        }

        .search-form button {
            height: 38px;
            border: none;
            background-color: #111827;
            color: white;
            padding: 0 15px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
        }

        .board-table {
            width: 100%;
            border-top: 2px solid #111827;
        }

        .board-head,
        .board-row {
            display: grid;
            grid-template-columns: 80px 120px minmax(260px, 1fr) 120px 90px 160px;
            text-align: center;
            align-items: center;
        }

        .board-head {
            min-height: 54px;
            border-bottom: 1px solid #d1d5db;
            background-color: #f8fafc;
            color: #111827;
            font-size: 15px;
            font-weight: 800;
        }

        .board-row {
            min-height: 70px;
            border-bottom: 1px solid #e5e7eb;
            color: #374151;
            font-size: 15px;
        }

        .board-row:hover {
            background-color: #f9fafb;
        }

        .board-no {
            color: #64748b;
            font-size: 14px;
        }

        .board-category {
            display: inline-block;
            margin: 0 auto;
            padding: 6px 12px;
            border-radius: 999px;
            background-color: #eff6ff;
            color: #2563eb;
            font-weight: 800;
            font-size: 13px;
        }

        .board-title {
            text-align: left;
            padding: 0 28px;
            font-weight: 700;
            color: #111827;
        }

        .board-title a:hover {
            color: #2563eb;
            text-decoration: underline;
        }

        .board-data {
            color: #475569;
            font-size: 14px;
        }

        .empty-box {
            padding: 80px 20px;
            text-align: center;
            color: #555;
            border-bottom: 1px solid #e5e7eb;
        }

        .empty-box h2 {
            font-size: 23px;
            margin-bottom: 10px;
            color: #111827;
        }

        .paging {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 32px;
        }

        .paging a {
            min-width: 36px;
            height: 36px;
            border: 1px solid #ddd;
            background-color: white;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 700;
            color: #334155;
        }

        .paging a:hover {
            background-color: #2563eb;
            color: white;
            border-color: #2563eb;
        }

        footer {
            margin-top: 60px;
            padding: 30px;
            text-align: center;
            color: #777;
            font-size: 14px;
            background-color: #fff;
            border-top: 1px solid #ddd;
        }
    </style>
</head>

<body>

<header>
    <div class="top-bar">
        <div class="top-inner">
            <div class="top-menu">
                <a href="/">🏠 홈</a>
                <a href="/notice">공지사항</a>
                <a href="/event">이벤트</a>
            </div>

            <div class="top-menu">
                <a href="/member/login">로그인</a>
                <a href="/member/signup">회원가입</a>
            </div>
        </div>
    </div>

    <div class="brand-area">
        <a href="/" class="logo">맛집<span>모아모아</span></a>

        <form class="search-box" action="/board/list" method="get">
            <input type="text" name="keyword" th:value="${page.keyword}" placeholder="자유게시판 검색">
            <button type="submit">🔍</button>
        </form>

        <div class="notice">
            <strong>실시간 인기글</strong> 자유게시판 새 글 확인하기
        </div>
    </div>

    <nav class="nav-area">
        <div class="nav-inner">
            <ul class="main-menu">
                <li><a href="/">🏠</a></li>
                <li><a href="/board/list" class="active">자유게시판</a></li>
                <li><a href="/photoBoard/list">인증게시판</a></li>
                <li><a href="/member/mypage">내정보</a></li>
            </ul>
        </div>
    </nav>
</header>

<main>
    <section class="page-title">
        <div>
            <h1>자유게시판</h1>
            <p>맛집 이야기와 자유로운 의견을 나누는 공간입니다.</p>
        </div>

        <a href="/board/write" class="write-btn">글쓰기</a>
    </section>

    <section class="content-grid">
        <aside>
            <h2>메뉴</h2>
            <a href="/">홈</a>
            <a href="/board/list" class="active">자유게시판</a>
            <a href="/photoBoard/list">인증게시판</a>
            <a href="/member/mypage">내정보</a>
        </aside>

        <section class="board-box">
            <div class="board-top">
                <h2>자유 게시글 목록</h2>

                <form class="search-form" action="/board/list" method="get">
                    <input type="text" name="keyword" th:value="${page.keyword}" placeholder="제목 검색">
                    <button type="submit">검색</button>
                </form>
            </div>

            <div class="board-table">
                <div class="board-head">
                    <div>번호</div>
                    <div>머릿말</div>
                    <div>제목</div>
                    <div>작성자</div>
                    <div>조회</div>
                    <div>작성일</div>
                </div>

                <div th:if="${#lists.isEmpty(boardList)}" class="empty-box">
                    <h2>등록된 게시글이 없습니다</h2>
                    <p>첫 번째 자유게시글을 작성해보세요.</p>
                    <br>
                    <a href="/board/write" class="write-btn">글쓰기</a>
                </div>

                <div th:if="${!#lists.isEmpty(boardList)}">
                    <div th:each="item : ${boardList}" class="board-row">
                        <div class="board-no" th:text="${item.no}">1</div>

                        <div>
                            <span class="board-category" th:text="${item.category}">잡담</span>
                        </div>

                        <div class="board-title">
                            <a th:href="@{/board/view(no=${item.no})}"
                               th:text="${item.title}">
                                게시글 제목
                            </a>
                        </div>

                        <div class="board-data" th:text="${item.name}">작성자</div>
                        <div class="board-data" th:text="${item.hit}">0</div>
                        <div class="board-data" th:text="${item.regDate}">2026-06-16</div>
                    </div>
                </div>
            </div>

            <div class="paging" th:if="${page.totalPage > 0}">
                <a th:each="i : ${#numbers.sequence(1, page.totalPage)}"
                   th:href="@{/board/list(page=${i}, keyword=${page.keyword})}"
                   th:text="${i}">
                    1
                </a>
            </div>
        </section>
    </section>
</main>

<footer>
    © 2026 맛집모아모아. All rights reserved.
</footer>

</body>
</html>
