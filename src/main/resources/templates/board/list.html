<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>자유게시판</title>
</head>
<body>

<h1>자유게시판</h1>

<a href="/board/write">글쓰기</a>

<table border="1">
    <tr>
        <th>번호</th>
        <th>머릿말</th>
        <th>제목</th>
        <th>작성자</th>
        <th>조회</th>
        <th>작성일</th>
    </tr>
    <tr th:each="item : ${boardList}">
        <td th:text="${item.no}"></td>
        <td th:text="${item.category}"></td>
        <td>
            <a th:href="@{/board/view(no=${item.no})}"
               th:text="${item.title}"></a>
        </td>
        <td th:text="${item.name}"></td>
        <td th:text="${item.hit}"></td>
        <td th:text="${item.regDate}"></td>
    </tr>
</table>
</body>
</html>
