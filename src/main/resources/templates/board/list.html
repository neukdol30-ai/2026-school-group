<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>자유게시판</title>

    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" th:href="@{/css/board/list.css}">
</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<main>
    <section class="page-title">
        <div>
            <h1>자유 게시판</h1>
            <p>자유롭게 이야기를 나누는 공간입니다.</p>
        </div>

        <a href="/board/write" class="write-btn">글쓰기</a>
    </section>

    <section class="content-grid">
        <aside>
            <h2>메뉴</h2>
            <a href="/">홈</a>
            <a href="/board/list" class="active">자유게시판</a>
            <a href="/photoBoard/list">인증게시판</a>
            <a href="/member/mypage">내정보</a>
        </aside>

        <section class="board-box">
            <div class="board-top">
                <form action="/board/list"
                      method="get"
                      style="display:flex;gap:10px;margin-bottom:20px;">

                    <input type="text"
                           name="keyword"
                           th:value="${page.keyword}"
                           placeholder="제목 검색"
                           style="
               flex:1;
               padding:10px;
               border:1px solid #ddd;
               border-radius:8px;">

                    <button type="submit"
                            class="write-btn"
                            style="border:none;">
                        검색
                    </button>

                </form>
                <h2>자유게시판 목록</h2>
                <span class="board-count" th:text="'전체 ' + ${#lists.size(boardList)} + '건'">전체 0건</span>
            </div>

            <div class="board-table">
                <div class="board-head"
                     style="grid-template-columns:80px 100px 1fr 120px 90px 90px 140px;">

                    <div>번호</div>
                    <div>머릿말</div>
                    <div>제목</div>
                    <div>작성자</div>
                    <div>조회수</div>
                    <div>추천수</div>
                    <div>작성일</div>

                </div>

                <div th:if="${#lists.isEmpty(boardList)}" class="empty-box">
                    <h2>등록된 자유게시글이 없습니다</h2>
                    <p>첫 번째 게시글을 작성해보세요.</p>
                    <br>
                    <a href="/board/write" class="write-btn">글쓰기</a>
                </div>

                <div th:if="${!#lists.isEmpty(boardList)}">

                    <div th:each="item : ${boardList}"
                         class="board-row"
                         style="grid-template-columns:80px 100px 1fr 120px 90px 90px 140px;">

                        <div class="board-no"
                             th:text="${item.no}">
                        </div>

                        <div class="board-data"
                             th:text="${item.category}">
                        </div>

                        <div class="board-title">

                            <a th:href="@{/board/view(no=${item.no})}"
                               th:text="${item.title}">
                            </a>

                        </div>

                        <div class="board-data"
                             th:text="${item.name}">
                        </div>

                        <div class="board-data"
                             th:text="${item.hit}">
                        </div>

                        <div class="board-data"
                             th:text="${item.likeCount}">
                        </div>

                        <div class="board-data"
                             th:text="${#temporals.format(item.regDate,'yyyy-MM-dd')}">
                        </div>

                    </div>

                </div>
            </div>

            <div class="paging">

                <a th:each="i : ${#numbers.sequence(1,page.totalPage)}"
                   th:href="@{/board/list(page=${i},keyword=${page.keyword})}">

                    <button th:text="${i}">
                    </button>

                </a>

            </div>
        </section>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
