<!DOCTYPE html>

<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>자유게시판 글쓰기</title>

    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" th:href="@{/css/board/write.css}">
</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<main>


    <section class="content-grid">

        <aside>
            <h2>메뉴</h2>
            <a href="/">홈</a>
            <a href="/board/list" class="active">자유게시판</a>
            <a href="/photoBoard/list">인증게시판</a>
            <a href="/member/mypage">내정보</a>
        </aside>

        <section class="write-card">

            <div class="write-title">
                <h1>📝 자유게시판 글쓰기</h1>
                <p>맛집 정보, 질문, 잡담을 자유롭게 작성해보세요.</p>
            </div>

            <form action="/board/write" method="post">

                <div class="form-row">

                    <div class="form-control">
                        <label>머릿말</label>

                        <select name="category">
                            <option value="잡담">잡담</option>
                            <option value="질문">질문</option>
                            <option value="정보">정보</option>
                        </select>
                    </div>

                    <div class="form-control">
                        <label>제목</label>

                        <input type="text"
                               name="title"
                               placeholder="제목을 입력하세요"
                               required>
                    </div>

                </div>

                <div class="form-row">

                    <div class="form-control">
                        <label>맛 평점</label>

                        <select name="tasteRating">
                            <option value="5">★★★★★ 5점</option>
                            <option value="4">★★★★☆ 4점</option>
                            <option value="3">★★★☆☆ 3점</option>
                            <option value="2">★★☆☆☆ 2점</option>
                            <option value="1">★☆☆☆☆ 1점</option>
                        </select>
                    </div>

                    <div class="form-control">
                        <label>시설 평점</label>

                        <select name="facilityRating">
                            <option value="5">★★★★★ 5점</option>
                            <option value="4">★★★★☆ 4점</option>
                            <option value="3">★★★☆☆ 3점</option>
                            <option value="2">★★☆☆☆ 2점</option>
                            <option value="1">★☆☆☆☆ 1점</option>
                        </select>
                    </div>

                </div>

                <div class="form-control">
                    <label>서비스 평점</label>

                    <select name="serviceRating">
                        <option value="5">★★★★★ 5점</option>
                        <option value="4">★★★★☆ 4점</option>
                        <option value="3">★★★☆☆ 3점</option>
                        <option value="2">★★☆☆☆ 2점</option>
                        <option value="1">★☆☆☆☆ 1점</option>
                    </select>
                </div>

                <div class="form-control">
                    <label>내용</label>

                    <textarea name="content"
                              placeholder="게시글 내용을 입력하세요"
                              required></textarea>
                </div>

                <div class="bottom-actions">

                    <a th:href="@{/board/list}"
                       class="btn btn-list">

                        목록

                    </a>

                    <div class="right-actions">

                        <a th:href="@{/board/list}"
                           class="btn btn-cancel">

                            취소

                        </a>

                        <button type="submit"
                                class="btn btn-submit">

                            등록

                        </button>

                    </div>

                </div>

            </form>

        </section>

    </section>


</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
