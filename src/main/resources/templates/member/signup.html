<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
</head>
<body>

<h2>회원가입</h2>

<form
        action="/member/signup"
        method="post"
        onsubmit="return validateForm()">

    <p>
        아이디 :
        <input type="text"
               id="memberId"
               name="memberId"
               required>

        <button type="button"
                onclick="idCheck()">
            중복확인
        </button>

        <span id="checkResult"></span>
    </p>

    <p>
        비밀번호 :
        <input type="password"
               id="password"
               name="password"
               required>
    </p>
    <small>
        8자 이상, 영문과 숫자를 포함해야 합니다.
    </small>
    <p id="passwordRule"></p>

    <p>
        비밀번호 확인 :
        <input type="password"
               id="passwordCheck"
               required>

        <span id="pwResult"></span>
    </p>

    <p>
        이름 :
        <input type="text" name="name" required>
    </p>

    <p>
        성별 :
        <input type="text" name="gender" placeholder="M 또는 F" required>
    </p>

    <p>
        생년월일 :
        <input type="date" name="birthDate" required>
    </p>

    <p>
        전화번호 :
        <input type="text" name="phone" required>
    </p>

    <p>
        주소 :
        <input type="text"
               name="address">
    </p>

    <p>
        상세주소 :
        <input type="text"
               name="detailAddress">
    </p>

    <button type="submit">
        회원가입
    </button>

</form>
<script>
    function idCheck(){

        const memberId =
            document.getElementById("memberId").value;

        fetch("/member/id-check",{
            method:"POST",
            headers:{
                "Content-Type":
                    "application/x-www-form-urlencoded"
            },
            body:"memberId="+memberId
        })
            .then(response=>response.json())
            .then(data=>{

                const result =
                    document.getElementById("checkResult");

                if(data.isDuplicate){
                    result.innerText =
                        "이미 사용중인 아이디입니다.";
                }else{
                    result.innerText =
                        "사용 가능한 아이디입니다.";
                }

            });
    }
</script>
<script>

    window.onload = function(){

        const pw =
            document.getElementById("password");

        const pwCheck =
            document.getElementById("passwordCheck");

        pwCheck.addEventListener("keyup", function(){

            const result =
                document.getElementById("pwResult");

            if(pw.value === pwCheck.value){

                result.innerText =
                    "비밀번호가 일치합니다.";

            }else{

                result.innerText =
                    "비밀번호가 일치하지 않습니다.";

            }

        });

    }

</script>

<hr>

<a href="/member/login">로그인</a>

<script>

    const password =
        document.getElementById("password");

    password.addEventListener("keyup", function(){

        const regex =
            /^(?=.*[A-Za-z])(?=.*\d).{8,}$/;

        const result =
            document.getElementById("passwordRule");

        if(regex.test(password.value)){

            result.style.color="blue";
            result.innerText=
                "사용 가능한 비밀번호입니다.";

        }else{

            result.style.color="red";
            result.innerText=
                "8자 이상 영문과 숫자를 포함해야 합니다.";
        }

    });

    function validateForm(){

        const pw =
            document.getElementById("password").value;

        const pwCheck =
            document.getElementById("passwordCheck").value;

        const regex =
            /^(?=.*[A-Za-z])(?=.*\d).{8,}$/;

        if(!regex.test(pw)){

            alert(
                "비밀번호는 8자 이상 영문과 숫자를 포함해야 합니다."
            );

            return false;
        }

        if(pw !== pwCheck){

            alert(
                "비밀번호 확인이 일치하지 않습니다."
            );

            return false;
        }

        return true;
    }

</script>

</body>
</html>
