<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>마이페이지</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial,"Noto Sans KR",sans-serif;
            background:#f3f4f6;
            color:#222;
        }

        a{
            text-decoration:none;
            color:inherit;
        }

        ul{
            list-style:none;
        }

        header{
            background:#fff;
            border-bottom:1px solid #ddd;
        }

        .top-bar{
            height:36px;
            border-bottom:1px solid #eee;
            font-size:13px;
            color:#666;
        }

        .top-inner{
            max-width:1200px;
            height:100%;
            margin:0 auto;
            padding:0 20px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .top-menu{
            display:flex;
            gap:18px;
        }

        .top-menu a:hover{
            color:#2563eb;
        }

        .brand-area{
            max-width:1200px;
            height:110px;
            margin:0 auto;
            padding:0 20px;
            display:flex;
            align-items:center;
            justify-content:space-between;
        }

        .logo{
            font-size:34px;
            font-weight:800;
            color:#2563eb;
        }

        .logo span{
            color:#111827;
        }

        .notice{
            font-size:14px;
            color:#444;
        }

        .nav-area{
            border-top:1px solid #eee;
            background:#fff;
        }

        .nav-inner{
            max-width:1200px;
            height:58px;
            margin:0 auto;
            padding:0 20px;
            display:flex;
            align-items:center;
        }

        .main-menu{
            display:flex;
            gap:38px;
            font-size:17px;
            font-weight:700;
        }

        .main-menu a{
            position:relative;
            padding:18px 0;
        }

        .main-menu a.active{
            color:#2563eb;
        }

        .main-menu a.active::after{
            content:"";
            position:absolute;
            left:0;
            bottom:10px;
            width:100%;
            height:3px;
            background:#2563eb;
            border-radius:999px;
        }

        main{
            max-width:1500px;
            margin:30px auto;
            padding:0 20px;
        }

        .content-grid{
            display:grid;
            grid-template-columns:260px 1fr;
            gap:32px;
        }

        aside{
            background:#fff;
            border-radius:12px;
            border:1px solid #ddd;
            overflow:hidden;
            height:fit-content;
        }

        aside h2{
            padding:18px 20px;
            background:#111827;
            color:#fff;
            font-size:18px;
        }

        aside a{
            display:block;
            padding:14px 20px;
            border-bottom:1px solid #eee;
            font-weight:600;
        }

        aside a:hover,
        aside a.active{
            background:#f3f4f6;
            color:#2563eb;
        }

        .board-box{
            background:#fff;
            border:1px solid #ddd;
            border-radius:12px;
            padding:36px 40px;
        }

        .board-top{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:24px;
        }

        .board-top h2{
            font-size:28px;
            font-weight:800;
        }

        .board-count{
            color:#64748b;
            font-size:14px;
        }

        .mypage-table{
            width:100%;
            border-collapse:collapse;
        }

        .mypage-table th{
            width:180px;
            padding:15px;
            background:#f8fafc;
            border:1px solid #e5e7eb;
            text-align:left;
        }

        .mypage-table td{
            padding:15px;
            border:1px solid #e5e7eb;
        }

    </style>

</head>

<body>

<header>
    <div class="top-bar">
        <div class="top-inner">
            <div class="top-menu">
                <a href="/">홈</a>
                <a href="/notice">공지사항</a>
            </div>

            <!-- 비회원 -->
            <div class="top-menu"
                 th:if="${session.loginUser == null}">
                <a href="/member/login">로그인</a>
                <a href="/member/signup">회원가입</a>
            </div>

            <!-- 회원 -->
            <div class="top-menu"
                 th:if="${session.loginUser != null}">
                <span>
                    <span th:text="${session.loginUser.name}"></span>님
                </span>

                <a href="/member/mypage">내정보</a>
                <a href="/member/logout">로그아웃</a>
            </div>
        </div>
    </div>

    <div class="brand-area">
        <a href="/" class="logo">
            맛집<span>모아모아</span>
        </a>

        <div class="notice">
            <strong>맛집 추천 사이트</strong>
        </div>
    </div>

    <nav class="nav-area">
        <div class="nav-inner">

            <ul class="main-menu">
                <li><a href="/">🏠</a></li>
                <li><a href="/board/list">자유게시판</a></li>
                <li><a href="/photoBoard/list">인증게시판</a></li>
                <li><a href="/member/mypage" class="active">내정보</a></li>
            </ul>

        </div>
    </nav>

</header>

<main>

    <section class="content-grid">

        <aside>

            <h2>메뉴</h2>

            <a href="/">홈</a>

            <a href="/board/list">
                자유게시판
            </a>

            <a href="/photoBoard/list">
                인증게시판
            </a>

            <a href="/member/mypage"
               class="active">
                내정보
            </a>

        </aside>

        <section class="board-box">

            <div class="board-top">

                <h2>마이페이지</h2>

                <span class="board-count">
                회원정보
            </span>

            </div>

            <table class="mypage-table">

                <tr>
                    <th>가입일</th>
                    <td th:text="${member.regDate}"></td>
                </tr>

                <tr>
                    <th>아이디</th>
                    <td th:text="${member.memberId}"></td>
                </tr>

                <tr>
                    <th>이름</th>
                    <td th:text="${member.name}"></td>
                </tr>

                <tr>
                    <th>성별</th>
                    <td th:text="${member.gender}"></td>
                </tr>

                <tr>
                    <th>전화번호</th>
                    <td th:text="${member.phone}"></td>
                </tr>

                <tr>
                    <th>주소</th>
                    <td>
                        <span th:text="${member.address}"></span>
                        <span th:text="${member.detailAddress}"></span>
                    </td>
                </tr>

                <tr>
                    <th>상세주소</th>
                    <td th:text="${member.detailAddress}">
                    </td>
                </tr>

                <tr>
                    <th>권한</th>
                    <td th:text="${member.role}">
                    </td>
                </tr>

                <tr th:if="${member.role == 'ADMIN'}">

                    <th>관리자</th>

                    <td>
                        관리자 계정입니다.
                    </td>

                </tr>

            </table>

            <div class="button-area">

                <!-- 일반 회원 -->

                <a th:if="${session.loginUser != null and session.loginUser.role != 'ADMIN'}"
                   href="/inquiry/list"
                   class="write-btn">

                    1:1 문의

                </a>

                <!-- 관리자 -->

                <a th:if="${session.loginUser != null and session.loginUser.role == 'ADMIN'}"
                   href="/admin/inquiry-list"
                   class="write-btn">

                    문의관리

                </a>

                <!-- 관리자 -->

                <a th:if="${session.loginUser != null and session.loginUser.role == 'ADMIN'}"
                   href="/admin"
                   class="write-btn">

                    관리자 홈

                </a>

                <a href="/member/edit"
                   class="write-btn">

                    회원정보수정

                </a>

                <a href="/member/logout"
                   class="write-btn">

                    로그아웃

                </a>

                <a href="/member/withdraw"
                   class="write-btn delete-btn"
                   onclick="return confirm('정말 탈퇴하시겠습니까?')">

                    회원탈퇴

                </a>

            </div>

        </section>

    </section>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<style>

    .button-area{
        margin-top:30px;
        display:flex;
        flex-wrap:wrap;
        gap:10px;
    }

    .write-btn{
        background:#2563eb;
        color:white;
        padding:13px 22px;
        border-radius:999px;
        font-weight:700;
        transition:0.2s;
    }

    .write-btn:hover{
        background:#1d4ed8;
    }

    .delete-btn{
        background:#dc2626;
    }

    .delete-btn:hover{
        background:#b91c1c;
    }

</style>

</body>
</html>
