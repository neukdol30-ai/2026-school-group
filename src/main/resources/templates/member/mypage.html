<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>마이페이지</title>


    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" th:href="@{/css/member/mypage.css}">

</head>

<body>

<header>
    <div class="top-bar">
        <div class="top-inner">
            <div class="top-menu">
                <a href="/">홈</a>
                <a href="/notice">공지사항</a>
            </div>

            <!-- 비회원 -->
            <div class="top-menu"
                 th:if="${session.loginUser == null}">
                <a href="/member/login">로그인</a>
                <a href="/member/signup">회원가입</a>
            </div>

            <!-- 회원 -->
            <div class="top-menu"
                 th:if="${session.loginUser != null}">
                <span>
                    <span th:text="${session.loginUser.name}"></span>님
                </span>

                <a href="/member/mypage">내정보</a>
                <a href="/member/logout">로그아웃</a>
            </div>
        </div>
    </div>

    <div class="brand-area">
        <a href="/" class="logo">
            맛집<span>모아모아</span>
        </a>

        <div class="notice">
            <strong>맛집 추천 사이트</strong>
        </div>
    </div>

    <nav class="nav-area">
        <div class="nav-inner">

            <ul class="main-menu">
                <li><a href="/">🏠</a></li>
                <li><a href="/board/list">자유게시판</a></li>
                <li><a href="/photoBoard/list">인증게시판</a></li>
                <li><a href="/member/mypage" class="active">내정보</a></li>
            </ul>

        </div>
    </nav>

</header>

<main>

    <section class="content-grid">

        <aside>

            <h2>메뉴</h2>

            <a href="/">홈</a>

            <a href="/board/list">
                자유게시판
            </a>

            <a href="/photoBoard/list">
                인증게시판
            </a>

            <a href="/member/mypage"
               class="active">
                내정보
            </a>

        </aside>

        <section class="board-box">

            <div class="board-top">

                <h2>마이페이지</h2>

                <span class="board-count">
                회원정보
            </span>

            </div>

            <table class="mypage-table">

                <tr>
                    <th>가입일</th>
                    <td th:text="${member.regDate}"></td>
                </tr>

                <tr>
                    <th>아이디</th>
                    <td th:text="${member.memberId}"></td>
                </tr>

                <tr>
                    <th>이름</th>
                    <td th:text="${member.name}"></td>
                </tr>

                <tr>
                    <th>성별</th>
                    <td th:text="${member.gender}"></td>
                </tr>

                <tr>
                    <th>전화번호</th>
                    <td th:text="${member.phone}"></td>
                </tr>

                <tr>
                    <th>주소</th>
                    <td>
                        <span th:text="${member.address}"></span>
                        <span th:text="${member.detailAddress}"></span>
                    </td>
                </tr>

                <tr>
                    <th>상세주소</th>
                    <td th:text="${member.detailAddress}">
                    </td>
                </tr>

                <tr>
                    <th>권한</th>
                    <td th:text="${member.role}">
                    </td>
                </tr>

                <tr th:if="${member.role == 'ADMIN'}">

                    <th>관리자</th>

                    <td>
                        관리자 계정입니다.
                    </td>

                </tr>

            </table>

            <div class="button-area">

                <!-- 일반 회원 -->

                <a th:if="${session.loginUser != null and session.loginUser.role != 'ADMIN'}"
                   href="/inquiry/list"
                   class="write-btn">

                    1:1 문의
                </a>

                <!-- 관리자 -->

                <a th:if="${session.loginUser != null and session.loginUser.role == 'ADMIN'}"
                   href="/admin/inquiry-list"
                   class="write-btn">

                    문의관리
                </a>

                <!-- 관리자 -->

                <a th:if="${session.loginUser != null and session.loginUser.role == 'ADMIN'}"
                   href="/admin"
                   class="write-btn">

                    관리자 홈
                </a>

                <a href="/member/edit"
                   class="write-btn">

                    회원정보수정
                </a>

                <a href="/member/logout"
                   class="write-btn">

                    로그아웃
                </a>

                <a href="/member/withdraw"
                   class="write-btn delete-btn"
                   onclick="return confirm('정말 탈퇴하시겠습니까?')">

                    회원탈퇴
                </a>

            </div>

        </section>

    </section>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
