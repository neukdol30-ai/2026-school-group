<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>마이페이지</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin:0;
            padding:0;
        }

        .container{
            width:800px;
            margin:50px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-bottom:30px;
        }

        th, td{
            border:1px solid #ddd;
            padding:12px;
        }

        th{
            background:#f8f8f8;
            width:150px;
        }

        .form-group{
            margin-bottom:15px;
        }

        label{
            display:inline-block;
            width:120px;
            font-weight:bold;
        }

        input{
            padding:8px;
            width:250px;
        }

        .btn{
            padding:10px 20px;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        .btn-update{
            background:#4CAF50;
            color:white;
        }

        .btn-logout{
            background:#2196F3;
            color:white;
            text-decoration:none;
            padding:10px 20px;
            border-radius:5px;
        }

        .btn-withdraw{
            background:#f44336;
            color:white;
            text-decoration:none;
            padding:10px 20px;
            border-radius:5px;
        }

        .button-area{
            text-align:center;
            margin-top:20px;
        }

    </style>

</head>
<body>

<div class="container">

    <h2>마이페이지</h2>

    <table>

        <tr>
            <th>가입일</th>
            <td th:text="${member.regDate}"></td>
        </tr>

        <tr>
            <th>아이디</th>
            <td th:text="${member.memberId}"></td>
        </tr>

        <tr>
            <th>이름</th>
            <td th:text="${member.name}"></td>
        </tr>

        <tr>
            <th>성별</th>
            <td th:text="${member.gender}"></td>
        </tr>

        <tr>
            <th>전화번호</th>
            <td th:text="${member.phone}"></td>
        </tr>

        <tr>
            <th>주소</th>
            <td>
                <span th:text="${member.address}"></span>
                <span th:text="${member.detailAddress}"></span>
            </td>
        </tr>

        <tr>
            <th>권한</th>
            <td th:text="${member.role}"></td>
        </tr>

    </table>

    <h3>회원정보 수정</h3>

    <form action="/member/update"
          method="post"
          onsubmit="return validateUpdateForm()">

        <p>
            현재 비밀번호
            <input type="password"
                   id="currentPassword"
                   name="currentPassword"
                   required>
        </p>

        <p>
            새 비밀번호
            <input type="password"
                   id="newPassword"
                   name="password">
        </p>

        <small>
            8자 이상, 영문 + 숫자 포함
        </small>

        <p id="passwordRule"></p>

        <p>
            새 비밀번호 확인
            <input type="password"
                   id="passwordCheck">
        </p>

        <p id="pwResult"></p>

        <p>
            <input type="checkbox"
                   id="showPassword">
            비밀번호 보기
        </p>

        <div class="form-group">
            <label>전화번호</label>
            <input type="text"
                   name="phone"
                   th:value="${member.phone}">
        </div>

        <div class="form-group">
            <label>주소</label>
            <input type="text"
                   name="address"
                   th:value="${member.address}">
        </div>

        <div class="form-group">
            <label>상세주소</label>
            <input type="text"
                   name="detailAddress"
                   th:value="${member.detailAddress}">
        </div>

        <button type="submit"
                class="btn btn-update">
            정보 수정
        </button>

    </form>

    <div class="button-area">

        <a href="/member/logout"
           class="btn-logout">
            로그아웃
        </a>

        <a href="/member/withdraw"
           class="btn-withdraw">
            회원탈퇴
        </a>

    </div>

</div>

<script>

    const pw =
        document.getElementById("newPassword");

    const pwCheck =
        document.getElementById("passwordCheck");

    pw.addEventListener("keyup", checkPassword);
    pwCheck.addEventListener("keyup", checkPassword);

    function checkPassword(){

        const result =
            document.getElementById("pwResult");

        if(pw.value === pwCheck.value){

            result.style.color="blue";
            result.innerText="비밀번호가 일치합니다.";

        }else{

            result.style.color="red";
            result.innerText="비밀번호가 일치하지 않습니다.";
        }
    }

    pw.addEventListener("keyup", function(){

        const regex =
            /^(?=.*[A-Za-z])(?=.*\d).{8,}$/;

        const result =
            document.getElementById("passwordRule");

        if(pw.value === ""){
            result.innerText="";
            return;
        }

        if(regex.test(pw.value)){

            result.style.color="blue";
            result.innerText="사용 가능한 비밀번호입니다.";

        }else{

            result.style.color="red";
            result.innerText="8자 이상 영문과 숫자를 포함해야 합니다.";
        }

    });

    document.getElementById("showPassword")
        .addEventListener("change", function(){

            const type =
                this.checked ? "text" : "password";

            document.getElementById("currentPassword").type = type;
            document.getElementById("newPassword").type = type;
            document.getElementById("passwordCheck").type = type;

        });

    function validateUpdateForm(){

        const password =
            document.getElementById("newPassword").value;

        const passwordCheck =
            document.getElementById("passwordCheck").value;

        if(password === ""){
            return true;
        }

        const regex =
            /^(?=.*[A-Za-z])(?=.*\d).{8,}$/;

        if(!regex.test(password)){

            alert("비밀번호는 8자 이상 영문과 숫자를 포함해야 합니다.");
            return false;
        }

        if(password !== passwordCheck){

            alert("비밀번호 확인이 일치하지 않습니다.");
            return false;
        }

        return true;
    }

</script>

</body>
</html>
