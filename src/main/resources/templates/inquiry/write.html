<!DOCTYPE html>

<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>문의하기</title>
</head>
<body>

<h2>1:1 문의하기</h2>

<form action="/inquiry/write"
      method="post">

    <p>
        문의유형
        <select name="category">
            <option value="GENERAL">일반문의</option>
            <option value="ACCOUNT">계정문의</option>
            <option value="BOARD">게시판문의</option>
            <option value="RESTAURANT">맛집문의</option>
            <option value="BUG">버그신고</option>
            <option value="REPORT">신고문의</option>
            <option value="ETC">기타</option>
        </select>
    </p>

    <p>
        제목
        <input type="text"
               name="title"
               required>
    </p>

    <p>
        연락처
        <input type="text"
               name="phone"
               placeholder="010-1234-5678"
               pattern="^01[0-9]-[0-9]{3,4}-[0-9]{4}$"
               required>
    </p>

    <p>
        내용
    </p>

    <textarea
            name="content"
            rows="10"
            cols="80"
            required>
</textarea>

    <br><br>

    <button type="submit">
        문의 등록
    </button>

</form>

</body>
</html>
