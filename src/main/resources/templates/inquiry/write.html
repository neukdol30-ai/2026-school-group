<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>1:1 문의하기</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet"/>
</head>

<body class="bg-base-200 min-h-screen">

<div class="container mx-auto pt-20 pb-10">

    <div class="text-center mb-6">
        <a href="/"
           class="text-5xl font-bold text-blue-600">
            맛집<span class="text-black">모아모아</span>
        </a>
    </div>

    <div class="card bg-base-100 shadow-xl max-w-3xl mx-auto">
        <div class="card-body">

            <div class="flex justify-between items-center mb-4">
                <h2 class="card-title text-3xl">
                    1:1 문의하기
                </h2>

                <a href="/inquiry/list"
                   class="btn btn-outline">
                    문의내역
                </a>
            </div>

            <div class="divider"></div>

            <form action="/inquiry/write"
                  method="post"
                  onsubmit="return validateInquiryForm()">

                <label class="label">
                    <span class="label-text">문의 유형</span>
                </label>
                <select name="category"
                        class="select select-bordered w-full"
                        required>
                    <option value="GENERAL">일반문의</option>
                    <option value="ACCOUNT">계정문의</option>
                    <option value="BOARD">게시판문의</option>
                    <option value="RESTAURANT">맛집문의</option>
                    <option value="BUG">버그신고</option>
                    <option value="REPORT">신고문의</option>
                    <option value="ETC">기타</option>
                </select>

                <label class="label mt-4">
                    <span class="label-text">제목</span>
                </label>
                <input type="text"
                       name="title"
                       class="input input-bordered w-full"
                       placeholder="문의 제목을 입력해주세요."
                       required>

                <label class="label mt-4">
                    <span class="label-text">연락처</span>
                </label>
                <input type="text"
                       id="phone"
                       name="phone"
                       class="input input-bordered w-full"
                       placeholder="010-1234-5678"
                       required>

                <p id="phoneMessage"
                   class="text-sm mt-2"></p>

                <label class="label mt-4">
                    <span class="label-text">문의 내용</span>
                </label>
                <textarea name="content"
                          rows="10"
                          class="textarea textarea-bordered w-full"
                          placeholder="문의하실 내용을 자세히 작성해주세요."
                          required></textarea>

                <div class="flex gap-3 mt-6">
                    <button type="submit"
                            class="btn btn-primary">
                        문의 등록
                    </button>

                    <a href="/inquiry/list"
                       class="btn btn-outline">
                        목록으로
                    </a>
                </div>

            </form>

        </div>
    </div>

</div>

<script>
    const phone = document.getElementById("phone");

    phone.addEventListener("keyup", function () {
        const regex = /^01[0-9]-?[0-9]{3,4}-?[0-9]{4}$/;
        const result = document.getElementById("phoneMessage");

        if (phone.value === "") {
            result.innerText = "";
            return;
        }

        if (regex.test(phone.value)) {
            result.className = "text-success text-sm mt-2";
            result.innerText = "올바른 전화번호입니다.";
        } else {
            result.className = "text-error text-sm mt-2";
            result.innerText = "010-1234-5678 형식으로 입력해주세요.";
        }
    });

    function validateInquiryForm() {
        const phoneRegex = /^01[0-9]-?[0-9]{3,4}-?[0-9]{4}$/;

        if (!phoneRegex.test(phone.value)) {
            alert("전화번호 형식이 올바르지 않습니다.");
            phone.focus();
            return false;
        }

        return true;
    }
</script>

</body>
</html>
