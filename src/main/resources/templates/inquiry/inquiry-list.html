<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>내 문의내역</title>

    <style>
        table {
            border-collapse: collapse;
            width: 100%;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }

        th {
            background: #f5f5f5;
        }

        .waiting {
            color: red;
            font-weight: bold;
        }

        .answered {
            color: blue;
            font-weight: bold;
        }

        .title {
            text-align: left;
        }

        .title a {
            text-decoration: none;
            color: black;
        }

        .title a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<h2>내 문의내역</h2>

<table>

    <tr>
        <th>번호</th>
        <th>유형</th>
        <th>제목</th>
        <th>상태</th>
        <th>작성일</th>
    </tr>

    <tr th:each="inquiry : ${inquiryList}">

        <td th:text="${inquiry.no}"></td>

        <td>
            <span th:switch="${inquiry.category}">
                <span th:case="'GENERAL'">일반문의</span>
                <span th:case="'ACCOUNT'">계정문의</span>
                <span th:case="'BOARD'">게시판문의</span>
                <span th:case="'RESTAURANT'">맛집문의</span>
                <span th:case="'REPORT'">신고문의</span>
                <span th:case="'BUG'">버그신고</span>
                <span th:case="'ETC'">기타</span>
            </span>
        </td>

        <td class="title">
            <a th:href="@{/inquiry/detail(no=${inquiry.no})}"
               th:text="${inquiry.title}">
            </a>
        </td>

        <td>
            <span th:switch="${inquiry.status}">
                <span th:case="'WAITING'" class="waiting">답변대기</span>
                <span th:case="'ANSWERED'" class="answered">답변완료</span>
            </span>
        </td>

        <td th:text="${#temporals.format(inquiry.regDate, 'yyyy-MM-dd HH:mm')}"></td>

    </tr>

</table>

<br>

<a href="/inquiry/write">+ 문의 작성</a>

</body>
</html>
