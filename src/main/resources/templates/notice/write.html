<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>공지사항 글쓰기</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, "Noto Sans KR", sans-serif;
            background-color: #f3f4f6;
            color: #222;
        }

        a { text-decoration: none; color: inherit; }

        main {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .write-box {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 36px 40px;
        }

        .write-box h1 {
            font-size: 30px;
            margin-bottom: 30px;
        }

        .form-row {
            margin-bottom: 22px;
        }

        .form-row label {
            display: block;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .form-row input,
        .form-row textarea {
            width: 100%;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            padding: 14px 16px;
            font-size: 15px;
            outline: none;
        }

        .form-row textarea {
            height: 320px;
            resize: none;
        }

        .btn-area {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 30px;
        }

        .btn {
            min-width: 90px;
            height: 46px;
            border-radius: 999px;
            border: none;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
        }

        .submit-btn {
            background-color: #2563eb;
            color: white;
        }

        .submit-btn:hover {
            background-color: #1d4ed8;
        }

        .cancel-btn {
            background-color: #e5e7eb;
            color: #111827;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .cancel-btn:hover {
            background-color: #d1d5db;
        }
    </style>
</head>

<body>

<main>
    <section class="write-box">
        <h1>공지사항 글쓰기</h1>

        <form th:action="@{/notice/write}" method="post">
            <div class="form-row">
                <label for="title">제목</label>
                <input type="text"
                       id="title"
                       name="title"
                       placeholder="공지사항 제목을 입력하세요"
                       required>
            </div>

            <div class="form-row">
                <label for="content">내용</label>
                <textarea id="content"
                          name="content"
                          placeholder="공지사항 내용을 입력하세요"
                          required></textarea>
            </div>

            <div class="btn-area">
                <a th:href="@{/notice/list}" class="btn cancel-btn">취소</a>
                <button type="submit" class="btn submit-btn">등록</button>
            </div>
        </form>
    </section>
</main>

</body>
</html>
